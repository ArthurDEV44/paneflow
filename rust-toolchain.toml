[toolchain]
# Pinned to the verified stable release used by local dev and CI.
# Keep this in lockstep with explicit `dtolnay/rust-toolchain@master`
# inputs in `.github/workflows/` and README/docs references.
# The workspace dep graph requires rustc >= 1.92 today
# (oo7 0.6, cosmic-text 0.17, smol_str 0.3, several wgpu/zbus crates),
# so anything older fails to build before tests can even start.
channel = "1.96.1"
components = ["rustfmt", "clippy"]
profile = "minimal"
