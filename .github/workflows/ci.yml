name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # US-018 AC1 + AC5: compute whether this event touches Rust-relevant code
  # so the (expensive) macos-14 runner only spins up when it would actually
  # catch a regression. Exports `rust=true|false`; downstream macos-check
  # job gates on it.
  #
  # Filter scope (AC1): Rust sources and their manifests, plus this very
  # workflow file — because a PR that edits ci.yml to tune the macOS gate
  # MUST also exercise the gate it's tuning, otherwise "fix the CI" PRs
  # self-skip and ship broken.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'src-app/**/*.rs'
              - 'crates/**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'

  check:
    name: Check, Lint & Test
    # US-004 (prd-v0.2.0-release-hardening): pinned to ubuntu-22.04 to match
    # release.yml's Linux matrix legs (runs-on: ubuntu-22.04 / ubuntu-22.04-arm)
    # so a green PR check guarantees the release build environment — same
    # glibc (2.35), same system library set. Do NOT revert to ubuntu-latest;
    # GitHub began rolling that label to 24.04 in early 2025 and the drift
    # would silently diverge CI from release.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      # US-012 (prd-ai-hooks-cross-platform.md) — the 6-triple matrix
      # requires each job to run `cargo build --workspace --release`.
      # On Linux x86_64 this also triggers `src-app/build.rs` to stage
      # the embedded `paneflow-shim` + `paneflow-ai-hook` binaries into
      # `target/embed-build/<triple>/release-min/`, which the size-budget
      # step below measures. Without this step, the nested binaries
      # would never be built on CI (build.rs only fires for paneflow-app
      # builds) and the size-cap assertion would point at a missing file.
      - name: Release build (workspace)
        run: cargo build --workspace --release

      # US-012 AC-4 — enforce the per-binary size caps from the PRD
      # Goals table, measured on the `release-min` profile (workspace
      # Cargo.toml) which applies `opt-level = "z"`, `lto = "fat"`,
      # `strip = "symbols"`, `panic = "abort"`.
      #
      # Two-tier check:
      #   * HARD cap → fails the build. Set to "current-measured-size +
      #     small slack" so a future dep bump that bloats either binary
      #     is caught immediately. Ratchet these caps DOWN as the
      #     shrinking follow-up lands (do NOT relax them without PRD
      #     sign-off; growing-only caps are a one-way door to rot).
      #   * SOFT cap → PRD Goals table launch target. Warns in job
      #     output when exceeded so the gap stays visible. Once the
      #     soft cap is met in code, collapse both tiers into the soft
      #     cap and delete this two-tier block.
      #
      # PRD soft caps: shim ≤ 600 KB, ai-hook ≤ 300 KB.
      # As measured on 2026-04-23 at HEAD of US-012:
      #   paneflow-shim     = 432 888 B   (meets soft 600 KB cap)
      #   paneflow-ai-hook  = 359 168 B   (50 KB over soft 300 KB cap)
      # Hard caps below reflect the as-measured reality plus ~6 %
      # regression headroom. paneflow-ai-hook MUST be shrunk to the
      # 300 KB soft cap before v0.3.0 ships — tracked as a US-001
      # follow-up in memory and in the US-012 story summary.
      #
      # Caps are gated at x86_64 Linux only (matches the PRD Goals
      # measurement target). Other targets may drift slightly due to
      # PE/Mach-O overhead and are not gated here.
      - name: Binary-size budget
        run: |
          set -euo pipefail
          TARGET_DIR="target/embed-build/x86_64-unknown-linux-gnu/release-min"
          SHIM_BIN="$TARGET_DIR/paneflow-shim"
          HOOK_BIN="$TARGET_DIR/paneflow-ai-hook"
          if [ ! -f "$SHIM_BIN" ] || [ ! -f "$HOOK_BIN" ]; then
            echo "::error::US-012: expected nested binaries under $TARGET_DIR — did src-app/build.rs run?"
            ls -la "$TARGET_DIR" 2>&1 || true
            exit 1
          fi
          SHIM_SIZE=$(stat -c%s "$SHIM_BIN")
          HOOK_SIZE=$(stat -c%s "$HOOK_BIN")
          # Hard caps (regression gate). Tighten as binaries shrink.
          SHIM_HARD=460800   # ~450 KB  (measured 423 KB + 6 % slack)
          HOOK_HARD=384000   # ~375 KB  (measured 351 KB + 6 % slack)
          # Soft caps (PRD launch targets). Warn-only until met.
          SHIM_SOFT=614400   # 600 KB
          HOOK_SOFT=307200   # 300 KB

          echo "paneflow-shim     = ${SHIM_SIZE} B  (hard ${SHIM_HARD} / soft ${SHIM_SOFT})"
          echo "paneflow-ai-hook  = ${HOOK_SIZE} B  (hard ${HOOK_HARD} / soft ${HOOK_SOFT})"

          fail=0
          if [ "$SHIM_SIZE" -gt "$SHIM_HARD" ]; then
            echo "::error::paneflow-shim size ${SHIM_SIZE} exceeds HARD cap ${SHIM_HARD}. Shrink via smaller deps or tighter release-min profile."
            fail=1
          elif [ "$SHIM_SIZE" -gt "$SHIM_SOFT" ]; then
            echo "::warning::paneflow-shim ${SHIM_SIZE} B is over the PRD soft cap ${SHIM_SOFT} B (600 KB). Non-blocking; tighten before v0.3.0."
          fi
          if [ "$HOOK_SIZE" -gt "$HOOK_HARD" ]; then
            echo "::error::paneflow-ai-hook size ${HOOK_SIZE} exceeds HARD cap ${HOOK_HARD}. Shrink via smaller deps or tighter release-min profile."
            fail=1
          elif [ "$HOOK_SIZE" -gt "$HOOK_SOFT" ]; then
            echo "::warning::paneflow-ai-hook ${HOOK_SIZE} B is over the PRD soft cap ${HOOK_SOFT} B (300 KB). Non-blocking; tighten before v0.3.0."
          fi
          exit $fail

  # US-006 (prd-v0.2.1-release-hardening.md): dependency advisory scan via
  # cargo-deny. Fail-forward posture:
  #   * licenses / sources / unmaintained / yanked → WARN only (surfaces
  #     findings without blocking merges).
  #   * advisories.vulnerabilities → has no warn-mode in cargo-deny 0.16+
  #     (upstream removed the downgrade path), so an active RustSec CVE
  #     will fail this step.
  # `continue-on-error: true` on the JOB means the red-X is visible in
  # the CI UI but the PR merge gate is NOT blocked for v0.2.1. Tighten
  # by flipping to `false` and elevating license severity to `deny` in
  # v0.2.2 once the lockfile is audit-clean.
  #
  # Gate on `changes.rust` for consistency with the `check` job above —
  # Cargo.toml/Cargo.lock edits are in that filter, so any change that
  # could affect the advisory result triggers the scan.
  security-audit:
    name: Security Audit (cargo-deny)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      # Reuse the same cache prefix as `check` so the advisory job
      # shares target/ with the main Linux build (no extra minutes
      # spent re-compiling for cargo-deny's own resolve).
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          key: security-audit

      - name: Install cargo-deny (pinned 0.19.x)
        # `--locked` pins cargo-deny's own dep graph for reproducibility.
        # `--version '^0.19'` accepts any 0.19.x patch but not 0.20+
        # (verified against deny.toml semantics: 0.16+ introduces the
        # `unmaintained = "workspace"` scope and `[[licenses.exceptions]]`
        # syntax we rely on; 0.19 is the current stable upstream and
        # the version validated locally before bumping).
        run: cargo install cargo-deny --locked --version '^0.19'

      - name: cargo deny check advisories licenses sources
        # Retry once with 30s backoff on a DB-fetch failure (GitHub's
        # RustSec mirror occasionally rate-limits). A second failure
        # surfaces `cargo deny check advisories --help` for debugging
        # alongside the RustSec advisory site URL in the job output.
        # AC7: advisory DB unreachable must not silently pass.
        run: |
          set -euo pipefail
          if ! cargo deny check advisories licenses sources; then
            echo "→ cargo-deny failed on first attempt — sleeping 30s and retrying once (probable RustSec DB rate-limit)" >&2
            sleep 30
            if ! cargo deny check advisories licenses sources; then
              echo "::error::cargo-deny check failed after retry. See https://embarkstudios.github.io/cargo-deny/ and the --help output below."
              cargo deny check advisories --help || true
              exit 1
            fi
          fi

  # US-001 (prd-macos-port.md): smoke build on Apple Silicon so the PaneFlow
  # dependency closure at the pinned GPUI rev (0b984b5) is proven to compile
  # on aarch64-apple-darwin before any of EP-002..EP-005 lands. The job runs
  # on every PR so a regression in platform-gated code is caught at the PR
  # gate rather than at release cut.
  #
  # Runner: macos-14 (Apple Silicon M1, 3 vCPU / 7 GB, Xcode + CLT preinstalled).
  # Fallback: if a PR consistently exceeds 20 min wall time on macos-14,
  # swap to `macos-14-xlarge` (6 vCPU, paid tier) and note the rationale
  # in the PR description per US-001 AC5.
  macos-check:
    name: macOS aarch64 smoke build
    # US-018 AC5: only run when Rust-relevant files change. `needs: changes`
    # waits for the cheap filter job (runs on ubuntu-latest, ~seconds) and
    # short-circuits the 14× pricier macos-14 runner on docs-only /
    # non-workflow .github/** PRs.
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      # US-003 — fail fast if the runner image drifts away from a full Xcode
      # install. The macos-14 hosted image ships Xcode 15+ with the Metal
      # toolchain preinstalled, so under normal conditions every check here
      # succeeds silently; the value is turning an otherwise cryptic mid-compile
      # "Metal.h: no such file" error into a clearly labelled preflight failure
      # that points at the runner configuration rather than the Rust source.
      #
      # The same step is expected to be ported to release.yml's macos-14 matrix
      # leg when US-019 adds it — keep this block in sync across workflows.
      - name: Verify Xcode CLT + Metal toolchain
        run: |
          set -euo pipefail

          CLT_PATH="$(xcode-select -p 2>/dev/null || true)"
          if [ -z "$CLT_PATH" ] || [ ! -d "$CLT_PATH" ]; then
            echo "::error::Xcode Command Line Tools not found (xcode-select -p returned '$CLT_PATH'). GitHub macos-14 runners should ship Xcode preinstalled — this indicates a runner image drift or a misconfigured self-hosted runner."
            exit 1
          fi
          echo "Xcode CLT path: $CLT_PATH"

          SDK_PATH="$(xcrun --show-sdk-path 2>/dev/null || true)"
          if [ -z "$SDK_PATH" ] || [ ! -d "$SDK_PATH" ]; then
            echo "::error::macOS SDK not found (xcrun --show-sdk-path returned '$SDK_PATH')."
            exit 1
          fi
          echo "macOS SDK path: $SDK_PATH"

          if ! xcrun --find metal >/dev/null 2>&1; then
            echo "::error::Metal compiler (xcrun --find metal) not available — the Metal Developer Tools component is missing from this Xcode install. gpui_macos compiles .metal shaders and will fail without it."
            exit 1
          fi
          echo "Metal compiler: $(xcrun --find metal)"

          METAL_HEADERS="$SDK_PATH/System/Library/Frameworks/Metal.framework/Headers"
          if [ ! -d "$METAL_HEADERS" ]; then
            echo "::error::Metal framework headers not found at $METAL_HEADERS. gpui_macos Objective-C bridging will fail with header-not-found errors."
            exit 1
          fi
          echo "Metal framework headers: $METAL_HEADERS"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          targets: aarch64-apple-darwin
          # US-018 AC2 adds cargo fmt + cargo clippy steps below — those
          # need the rustfmt + clippy components, which dtolnay's action
          # does NOT install by default even when `targets:` is set.
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          key: aarch64-apple-darwin

      # US-018 AC2 — formatting + lint on macOS. fmt is platform-agnostic
      # but runs here too so formatter version drift between local Linux
      # dev machines and the macOS runner never sneaks past the gate.
      - name: cargo fmt --check
        run: cargo fmt --check

      # clippy is scoped to the aarch64-apple-darwin target so it
      # type-checks platform-gated modules (runtime_paths.rs macOS arm,
      # install_method::AppBundle, update_checker::AssetFormat::Dmg,
      # etc.) that the ubuntu `check` job would otherwise miss.
      - name: cargo clippy (aarch64-apple-darwin)
        run: cargo clippy --workspace --target aarch64-apple-darwin -- -D warnings

      # cargo test on the config crate (39 tests) + app crate (testable
      # modules like keybindings / update_checker with 150+ tests).
      # `--target` pins compilation to aarch64-apple-darwin so test
      # binaries are native Mach-O and the test run exercises the real
      # macOS codepath, not a Linux-host proxy.
      - name: cargo test --workspace
        run: cargo test --workspace --target aarch64-apple-darwin

      # AC1 — cargo check must exit 0 with no linker errors.
      - name: cargo check (aarch64-apple-darwin)
        run: cargo check --workspace --target aarch64-apple-darwin

      # AC2 — release build produces the expected binary path.
      - name: cargo build --release (aarch64-apple-darwin)
        run: cargo build --release -p paneflow-app --target aarch64-apple-darwin

      # AC3 — verify the produced binary is a Mach-O arm64 executable.
      - name: Verify Mach-O arm64 binary
        run: |
          BIN=target/aarch64-apple-darwin/release/paneflow
          test -f "$BIN"
          file "$BIN"
          file "$BIN" | grep -q 'Mach-O 64-bit executable arm64'

      # AC4 — on failure the job logs already capture the failing crate and
      # error; uploading the binary on success gives reviewers an artifact
      # they can `file`/`otool` locally if something downstream misbehaves.
      - name: Upload aarch64 binary artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: paneflow-aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/paneflow
          if-no-files-found: error
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────
  # Visual rendering smoke test — macOS aarch64.
  #
  # Catches the exact class of regression fixed in commit c3e2331
  # ("fix(font): macOS empty-text rendering across sidebar, tabs, and
  # terminal"): a PaneFlow build that compiles, links, and notarizes
  # cleanly but renders zero glyphs because Core Text inside a `.app`
  # bundle silently fails to surface the configured monospace family
  # and no embedded font fallback is wired. The release pipeline never
  # noticed because no leg ever launched the `.app` — every gate was
  # compile/sign/notarize, none was visual. This job closes that hole at
  # the PR gate so the regression cannot reach `main`.
  #
  # Pipeline: download the binary built by `macos-check` → wrap it in
  # the same `.app` skeleton `release.yml` ships → launch the binary
  # inside the bundle (so Core Text sees the bundle context, exactly
  # like an end-user install) → screencapture → soft OCR sanity check.
  # The screenshot is always uploaded so reviewers can eyeball the
  # PR's macOS rendering even when the OCR gate is happy.
  #
  # Gates:
  #   * HARD — `font: resolved family=...` line MUST appear in the app
  #     log (proves the renderer reached `cached_font_config()`, i.e.
  #     the app didn't crash before first frame).
  #   * SOFT — OCR finds ≥10 alphanumeric chars (the macOS menubar
  #     alone passes this trivially when rendering works; failure
  #     means we're staring at a black screen or empty cells).
  #
  # Runner: macos-14 hosts a real macOS user session with WindowServer
  # access — GUI apps launch and render normally, exactly the pattern
  # used by Electron / Flutter / native-Cocoa CI setups.
  # ───────────────────────────────────────────────────────────────────────
  macos-render-smoke:
    name: macOS aarch64 render smoke (visual)
    needs: [changes, macos-check]
    if: needs.changes.outputs.rust == 'true'
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Download paneflow binary
        uses: actions/download-artifact@v4
        with:
          name: paneflow-aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/

      - name: Restore executable bit
        # actions/upload-artifact strips the executable bit on macOS/
        # Linux outputs (https://github.com/actions/upload-artifact/issues/38).
        # Without this, `bundle-macos.sh`'s `install -m 0755` would copy
        # a non-executable file and `open` would fail with EACCES.
        run: chmod +x target/aarch64-apple-darwin/release/paneflow

      - name: Bundle .app
        # Reuse the production bundling script so the smoke test exercises
        # the SAME `.app` skeleton end-users get — Info.plist, .icns,
        # MacOS/paneflow layout. Unsigned: signing is not what the bug
        # was about (the original c3e2331 root cause reproduced equally
        # in unsigned bundles per Core Text's bundle-context behavior),
        # and skipping codesign keeps this gate free of Apple secrets.
        run: |
          set -euo pipefail
          bash scripts/bundle-macos.sh --version "0.0.0-ci" --arch aarch64

      - name: Launch .app and capture screenshot
        run: |
          set -euo pipefail
          APP="dist/PaneFlow.app"

          # Launch the binary INSIDE the bundle directly (rather than
          # `open -a`) so stdout/stderr can be redirected — `open` does
          # not tee child output and the `font: resolved family=` log
          # line is our hard gate. The bundle path is preserved, so
          # Info.plist + Resources/ load correctly and Core Text sees
          # the same bundle context as a real install.
          RUST_LOG=info "$APP/Contents/MacOS/paneflow" \
            >paneflow.log 2>&1 &
          APP_PID=$!

          # Cold-launch on macos-14 (M1, 3 vCPU): GPUI window creation
          # + Vulkan-equivalent Metal init + first paint typically lands
          # under 5s. 10s gives generous slack for runner contention.
          sleep 10

          # `-x` skips the camera-shutter sound; captures every display.
          screencapture -x screenshot.png

          # Clean shutdown so the runner doesn't carry a live paneflow
          # process into the next step. SIGTERM lets GPUI's Drop chain
          # (PTY shutdown, IPC socket cleanup) run; SIGKILL is the belt
          # in case the main thread is blocked.
          kill "$APP_PID" 2>/dev/null || true
          sleep 2
          kill -9 "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true

          # HARD GATE: the resolved-font log line must be present.
          # Absence means the app crashed before reaching
          # cached_font_config() — i.e. before the renderer ever asked
          # for a font, which is upstream of every rendering-correctness
          # property this job exists to verify.
          echo "── Resolved font ──"
          if grep "font: resolved family=" paneflow.log; then
            if grep -q "font: resolved family='JetBrains Mono'" paneflow.log; then
              echo "::warning::Embedded JetBrains Mono fallback was selected — Core Text did not surface a system mono family (Menlo / Monaco / Courier). The fallback is the safety net working as designed, but persistent selection on macos-14 indicates a Core Text drift worth investigating."
            fi
          else
            echo "::error::No 'font: resolved family=' line in app log. The app likely crashed before first render — paneflow.log + screenshot.png artifacts will pin down the exact failure."
            exit 1
          fi

      - name: OCR sanity check (text rendered?)
        # Soft gate: tesseract output is fuzzy and we don't want flaky
        # OCR to block PRs. The signal still surfaces in the CI log
        # (alphanumeric char count) and the screenshot artifact is
        # available for human review on every run.
        continue-on-error: true
        run: |
          set -euo pipefail
          brew install --quiet tesseract
          text="$(tesseract screenshot.png - 2>/dev/null || true)"
          echo "── OCR output (first 50 lines) ──"
          echo "$text" | head -50
          char_count="$(echo "$text" | tr -cd '[:alnum:]' | wc -c | tr -d ' ')"
          echo "OCR alphanumeric chars: $char_count"
          # Threshold rationale: the macOS menubar (Apple logo,
          # "Finder", clock, date) alone OCRs to ~30+ chars on a healthy
          # session. <10 chars almost always means rendering is broken
          # — either the screen is black or every glyph rendered as a
          # blank cell, which is the c3e2331 failure mode.
          if [ "$char_count" -lt 10 ]; then
            echo "::warning::OCR found <10 alphanumeric chars. Visual rendering may be broken — inspect screenshot.png artifact."
          fi

      - name: Upload visual smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-render-smoke
          path: |
            screenshot.png
            paneflow.log
          if-no-files-found: warn
          retention-days: 7

  # US-003 + US-018 (prd-windows-port.md): windows-2022 PR gate. Runs the
  # full Rust quality suite (fmt + clippy + test + check) against the
  # x86_64-pc-windows-msvc target, plus toolchain/WiX verification. US-003
  # stood up the runner + WiX scaffolding; US-018 promotes the job from
  # "smoke cargo check with continue-on-error" to a required quality gate
  # now that EP-W2 (US-004..US-008) + EP-W3 (US-009) have cfg-guarded the
  # POSIX-locked code that previously broke the cross-compile.
  #
  # Runner: windows-2022 hosted image ships VS 2022 Build Tools + the
  # Windows SDK preinstalled but does NOT expose cl/link/signtool on the
  # default shell PATH. ilammy/msvc-dev-cmd loads the VS dev env (cl,
  # link, lib) and an inline PowerShell step prepends the latest SDK
  # bin dir (for signtool.exe) to $GITHUB_PATH.
  #
  # Time budget (US-018 AC-4): <5 min cached. Swatinem/rust-cache handles
  # cargo's share (keyed on `x86_64-pc-windows-msvc` so Linux/macOS cache
  # slots don't collide); actions/cache covers WiX's ~10 MB global tool
  # install. `timeout-minutes: 30` is a runaway guard, not the SLA.
  windows-check:
    name: Windows x86_64 smoke check
    # US-003 AC1 + matches macos-check behavior: skip on docs-only PRs so
    # Windows minutes aren't burned on README tweaks. The filter in the
    # `changes` job already includes .github/workflows/ci.yml, so any
    # edit to this file retriggers the gate.
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-2022
    timeout-minutes: 30
    env:
      # US-009 (v0.2.1): `ilammy/msvc-dev-cmd@v1` (latest v1.13.0 as of
      # 2026-04-21) still declares `runs: using: node20` in its
      # action.yml. Upstream issue #99 + PR #101 are open but not
      # merged. GitHub Actions force-migrates to Node 24 on 2026-06-02
      # and removes Node 20 on 2026-09-16. This env shim instructs the
      # runner to execute the action on the node24 binary regardless
      # of its declared runtime — documented in
      # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
      # Remove this env once `ilammy/msvc-dev-cmd` publishes a tag
      # that declares `using: node24` natively, and pin to that tag.
      # Scoped to this job so other jobs don't silently accept
      # stragglers elsewhere.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      # Load VS 2022 Build Tools env: cl.exe, link.exe, lib.exe on PATH,
      # INCLUDE/LIB/LIBPATH set. Required by AC-2's `where cl.exe link.exe`.
      # x64 arch targets the same toolchain the rustc msvc triple uses.
      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # signtool.exe ships in the Windows 10 SDK bin dir but is not on the
      # VS Dev Cmd PATH. Resolve the highest-versioned SDK bin subdir and
      # append it to $GITHUB_PATH so later steps (and US-015's signing
      # script work) see it. Explicit `throw` on not-found turns a silent
      # drift of the runner image into a labelled preflight failure.
      - name: Add Windows SDK bin to PATH (for signtool)
        shell: pwsh
        run: |
          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          $sdkBin = Get-ChildItem $sdkRoot -Directory |
            Where-Object { $_.Name -match '^10\.' } |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $sdkBin) {
            throw "Windows 10 SDK bin directory not found under $sdkRoot — runner image drift?"
          }
          $signtoolDir = Join-Path $sdkBin.FullName 'x64'
          Write-Output "Using SDK bin: $signtoolDir"
          Add-Content -Path $env:GITHUB_PATH -Value $signtoolDir

      # AC-2 — toolchain binaries all on PATH.
      - name: Verify signtool.exe / cl.exe / link.exe on PATH
        shell: pwsh
        run: |
          where.exe signtool.exe
          where.exe cl.exe
          where.exe link.exe

      # US-003 AC-1 + US-018 AC-1: Rust toolchain with rustfmt + clippy
      # components (required by the fmt/clippy steps below) and the MSVC
      # cross-compile target.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          key: x86_64-pc-windows-msvc

      # Note: WiX toolset is NOT installed in this PR gate. The MSI build
      # lives in release.yml only (US-016), which uses WiX v3 (candle.exe +
      # light.exe) via the windows-2022 preinstalled toolset paired with
      # cargo-wix 0.3.9 (cargo-wix has no WiX v4/v5 backend — see
      # volks73/cargo-wix#202). Installing `dotnet tool install --global wix`
      # here would surface WiX v5 — incompatible with the release pipeline
      # and unused by the fmt/clippy/test/check gate below, so it's omitted
      # to keep the CI check accurate to what it verifies.

      # ─── US-018 AC-2: quality-gate steps in mandated order ────────────────
      # fmt → clippy → test → check. Each step fails the job fast (`-D
      # warnings` on clippy, `set -e` semantics from GitHub Actions on
      # every step) so a Windows-specific regression surfaces at the PR
      # gate with the exact file:line from rustc/clippy output rather
      # than slipping into release.yml's best-effort Windows leg.

      # AC-2 step 1/4: formatting. `--all` forces every workspace member;
      # `--check` is the non-destructive mode that fails on unformatted
      # code. Runs first because a format failure is cheap and the 3
      # later steps then operate on consistently-formatted source.
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      # AC-2 step 2/4: clippy. `--target x86_64-pc-windows-msvc` selects
      # the Windows codepaths — cfg-gated modules (terminal::TerminateProcess,
      # install_method::WindowsMsi, ipc's interprocess branch, etc.) are
      # only type-checked when this target is chosen. `-D warnings`
      # promotes every clippy lint + unused-import warning to an error,
      # matching the Linux `check` job pattern (line 74) and the release
      # pipeline's clippy gate.
      - name: cargo clippy --target x86_64-pc-windows-msvc
        run: cargo clippy --workspace --target x86_64-pc-windows-msvc -- -D warnings

      # AC-2 step 3/4: tests. Currently all 39 tests live in paneflow-config
      # (platform-neutral: JSON schema, file watcher, keybinding parser);
      # the app crate has no tests per the project convention. Running
      # `--target x86_64-pc-windows-msvc` builds + runs the test binaries
      # as native x86_64 PE executables, proving the Windows test runner
      # picks up the same test set and nothing regresses on the MSVC toolchain.
      - name: cargo test --workspace --target x86_64-pc-windows-msvc
        run: cargo test --workspace --target x86_64-pc-windows-msvc

      # AC-2 step 4/4: final check. Redundant with clippy in practice
      # (clippy is a superset), but kept as a belt-and-braces signal and
      # because the PRD AC lists it explicitly — a bare `cargo check`
      # failure is a clearer error surface than clippy's noisier output
      # when the problem is a pure compile error (missing API, linker
      # symbol, etc.) rather than a lint. No `continue-on-error` anymore
      # (US-003 set it; EP-W2/W3 landing made it unnecessary).
      - name: cargo check --workspace --target x86_64-pc-windows-msvc
        run: cargo check --workspace --target x86_64-pc-windows-msvc

      # US-012 (prd-ai-hooks-cross-platform.md) AC — the matrix requires
      # `cargo build --workspace --release` on every leg. On Windows this
      # also triggers the `src-app/build.rs` nested build of
      # `paneflow-shim` + `paneflow-ai-hook`, ensuring their PE binaries
      # embed cleanly via rust-embed and the AI-hook pipeline compiles
      # end-to-end on MSVC.
      - name: cargo build --workspace --release
        run: cargo build --workspace --release --target x86_64-pc-windows-msvc

      # Mirror of the macos-check `Upload aarch64 binary artifact` step:
      # exposes the just-built `paneflow.exe` as a workflow artifact so
      # the downstream `windows-render-smoke` job can pull it without
      # paying a second `cargo build` (the cache hit path on subsequent
      # PRs is fast, but the from-scratch path on cold runs is ~5 min).
      - name: Upload x86_64 binary artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: paneflow-x86_64-pc-windows-msvc
          path: target/x86_64-pc-windows-msvc/release/paneflow.exe
          if-no-files-found: error
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────
  # Visual rendering smoke test — Windows x86_64.
  #
  # Mirrors `macos-render-smoke` for the Windows GPUI rendering stack
  # (Direct2D / DirectWrite, DX11 backend GA Oct 2025). Catches the
  # same class of regression: a build that compiles + signs cleanly
  # but renders no glyphs because DirectWrite font enumeration silently
  # fails to surface the configured monospace family. The embedded
  # JetBrains Mono fallback wired by commit c3e2331 protects against
  # this on Windows too — this job verifies the safety net actually
  # holds end-to-end on a hosted runner.
  #
  # Gates:
  #   * HARD — `font: resolved family=...` must appear in the app log.
  #   * SOFT — visual artifact uploaded for human review (no OCR gate
  #     because tesseract on Windows requires a heavier install path
  #     and the screenshot+log signal is already enough to spot the
  #     "boxes drawn, no glyphs" failure mode).
  #
  # Runner: windows-2022 hosts a real Windows desktop session — GUI
  # apps launch and render normally, exactly the pattern used by
  # WPF / WinUI / Electron CI setups.
  # ───────────────────────────────────────────────────────────────────────
  windows-render-smoke:
    name: Windows x86_64 render smoke (visual)
    needs: [changes, windows-check]
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-2022
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Download paneflow.exe
        uses: actions/download-artifact@v4
        with:
          name: paneflow-x86_64-pc-windows-msvc
          path: target/x86_64-pc-windows-msvc/release/

      - name: Launch paneflow.exe and capture screenshot
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = "target\x86_64-pc-windows-msvc\release\paneflow.exe"
          if (-not (Test-Path $exe)) {
            throw "Expected $exe to exist after download-artifact step."
          }

          # Launch detached so we can sleep + capture, with stdout +
          # stderr teed to a log file. RUST_LOG=info is required to
          # surface the `font: resolved family=` line emitted by
          # terminal/element/font.rs:215 — the hard gate below greps
          # for it.
          $env:RUST_LOG = 'info'
          $proc = Start-Process -FilePath $exe `
                                -PassThru `
                                -RedirectStandardOutput 'paneflow.log' `
                                -RedirectStandardError  'paneflow.err.log'

          # Cold launch on windows-2022 (4 vCPU, 16 GB RAM) typically
          # hits first paint in 4-6s. 10s gives generous slack for
          # runner contention + DX11 swap-chain init.
          Start-Sleep -Seconds 10

          # Capture the primary display via System.Drawing — works on
          # every windows-2022 runner without external tooling. The
          # bounds-then-CopyFromScreen pattern is the canonical .NET
          # screenshot recipe used by every Windows GUI CI setup.
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap($bounds.Width, $bounds.Height)
          $g   = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $bmp.Save("$pwd\screenshot.png", [System.Drawing.Imaging.ImageFormat]::Png)
          $g.Dispose()
          $bmp.Dispose()

          # Clean shutdown. Stop-Process is SIGTERM-equivalent; -Force
          # is the SIGKILL belt for a wedged main thread. Tolerate a
          # process that already exited.
          if (-not $proc.HasExited) {
            Stop-Process -Id $proc.Id -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 2
            if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            }
          }

          # Merge stderr into the main log so the grep below picks up
          # log::info! lines (env_logger writes to stderr by default).
          if (Test-Path 'paneflow.err.log') {
            Get-Content 'paneflow.err.log' | Add-Content 'paneflow.log'
          }

          Write-Output "── Resolved font ──"
          $fontLine = Select-String -Path 'paneflow.log' -Pattern 'font: resolved family=' -SimpleMatch
          if (-not $fontLine) {
            Write-Output "::error::No 'font: resolved family=' line in app log. The app likely crashed before first render — paneflow.log + screenshot.png artifacts will pin down the exact failure."
            exit 1
          }
          $fontLine | ForEach-Object { Write-Output $_.Line }
          if ($fontLine.Line -match "family='JetBrains Mono'") {
            Write-Output "::warning::Embedded JetBrains Mono fallback was selected — DirectWrite did not surface a system mono family (Cascadia Mono / Cascadia Code / Consolas). The fallback is the safety net working as designed, but persistent selection on windows-2022 indicates a DirectWrite drift worth investigating."
          }

      - name: Upload visual smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-render-smoke
          path: |
            screenshot.png
            paneflow.log
          if-no-files-found: warn
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────
  # US-012 (prd-ai-hooks-cross-platform.md) — matrix completion.
  # Existing jobs cover:
  #   * check         — x86_64-unknown-linux-gnu   (Linux x64 full gate)
  #   * macos-check   — aarch64-apple-darwin       (Apple Silicon full gate)
  #   * windows-check — x86_64-pc-windows-msvc     (Windows x64 full gate)
  # The three jobs below close the remaining triples:
  #   * linux-aarch64-check   — aarch64-unknown-linux-gnu
  #   * macos-x86_64-check    — x86_64-apple-darwin
  #   * windows-aarch64-check — aarch64-pc-windows-msvc (check-only; no
  #                              native Windows-arm64 hosted runner as of
  #                              2026-04. Deferred per US-012 AC.)
  # All three are gated on `needs.changes.outputs.rust == 'true'` so
  # docs-only PRs don't burn minutes on the extended matrix.
  # ───────────────────────────────────────────────────────────────────────

  linux-aarch64-check:
    name: Linux aarch64 (aarch64-unknown-linux-gnu)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    # Native ARM runner (GitHub public preview since late 2024, used
    # by release.yml on the same pattern — see the comment at
    # release.yml:34-37). Same image basis as ubuntu-22.04 so the
    # system-deps list mirrors the x86_64 `check` job above without
    # drift.
    #
    # Fallback posture (US-012 AC unhappy path): if the
    # `ubuntu-22.04-arm` label is ever withdrawn or starts queuing
    # >30 min, fall back to `cross = "0.2.5"` emulated build
    # documented in the AC. `cross`'s Vulkan + X11 sysroot for
    # aarch64-unknown-linux-gnu needs manual header staging; that
    # complexity is why this job prefers the native runner.
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt, clippy
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          key: aarch64-unknown-linux-gnu

      # fmt runs here too so formatter-version drift between dev boxes
      # (x86_64) and the arm runner is caught at the PR gate.
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy (aarch64-unknown-linux-gnu)
        run: cargo clippy --workspace --target aarch64-unknown-linux-gnu -- -D warnings

      - name: cargo test --workspace (aarch64-unknown-linux-gnu)
        run: cargo test --workspace --target aarch64-unknown-linux-gnu

      - name: cargo build --workspace --release (aarch64-unknown-linux-gnu)
        run: cargo build --workspace --release --target aarch64-unknown-linux-gnu

  macos-x86_64-check:
    name: macOS x86_64 (x86_64-apple-darwin)
    needs: changes
    # DISABLED until v0.3.0 — `release.yml` already marks this leg CLOSED
    # (queue-time volatility + Apple Dev secrets not provisioned). Even
    # with `continue-on-error: true` the queued job kept the overall run
    # in `in_progress` for 30-60 min waiting for a `macos-13` runner,
    # masking the actual completion of every other green leg in the
    # matrix. macOS aarch64 (Apple Silicon) covers the day-to-day macOS
    # cross-compile signal; Intel-mac correctness will be re-validated
    # on the release pipeline once Apple Dev secrets and signing are
    # provisioned. Re-enable by flipping the `if:` condition below.
    if: false
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt, clippy
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          key: x86_64-apple-darwin

      # fmt runs here too so a formatter-version drift between dev
      # boxes (usually aarch64 Apple Silicon now) and the Intel-mac
      # runner is caught at the PR gate, matching every other leg in
      # this workflow.
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy (x86_64-apple-darwin)
        run: cargo clippy --workspace --target x86_64-apple-darwin -- -D warnings

      - name: cargo test --workspace (x86_64-apple-darwin)
        run: cargo test --workspace --target x86_64-apple-darwin

      - name: cargo build --workspace --release (x86_64-apple-darwin)
        run: cargo build --workspace --release --target x86_64-apple-darwin

  windows-aarch64-check:
    name: Windows aarch64 (aarch64-pc-windows-msvc, check-only)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    # US-012 AC explicitly defers integration tests on Windows aarch64
    # because no native Windows-arm64 hosted runner is available on
    # GitHub-hosted Actions as of 2026-04. This leg cross-compiles from
    # an x86_64 MSVC host and runs `cargo check` only — enough to catch
    # type-level regressions in cfg(windows) + target_arch = "aarch64"
    # code paths without requiring QEMU or a self-hosted arm64 Windows
    # box. Promote to full test coverage once GitHub ships a native
    # runner image (watch
    # https://github.com/actions/runner-images/issues/10820).
    runs-on: windows-2022
    timeout-minutes: 30
    env:
      # Same Node 24 forcing as windows-check above — ilammy/msvc-dev-cmd
      # hasn't shipped a node24-native tag yet.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      # Load the amd64-hosted arm64 MSVC env — `amd64_arm64` populates
      # INCLUDE/LIB/LIBPATH with the aarch64 Windows SDK paths plus the
      # x64 host tools, so any future C/C++ `build.rs` in the dep
      # closure that targets aarch64 Windows can resolve headers /
      # libs without a runner-image drift breaking the job. Bare
      # `arch: x64` would leave aarch64 SDK vars unset, which is fine
      # for `cargo check` / `cargo clippy` on pure Rust (no link step)
      # but silently fails the moment a transitive crate grows a
      # `cc`/`bindgen` build.rs. Preempt that class of latent breakage.
      - name: Setup MSVC developer environment (amd64 host, arm64 target)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: clippy
          targets: aarch64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          key: aarch64-pc-windows-msvc

      - name: cargo clippy --target aarch64-pc-windows-msvc
        run: cargo clippy --workspace --target aarch64-pc-windows-msvc -- -D warnings

      - name: cargo check --target aarch64-pc-windows-msvc
        run: cargo check --workspace --target aarch64-pc-windows-msvc
