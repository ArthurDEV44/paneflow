name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # US-018 AC1 + AC5: compute whether this event touches Rust-relevant code
  # so the (expensive) macos-14 runner only spins up when it would actually
  # catch a regression. Exports `rust=true|false`; downstream macos-check
  # job gates on it.
  #
  # Filter scope (AC1): Rust sources and their manifests, plus this very
  # workflow file — because a PR that edits ci.yml to tune the macOS gate
  # MUST also exercise the gate it's tuning, otherwise "fix the CI" PRs
  # self-skip and ship broken.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'src-app/**/*.rs'
              - 'crates/**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'

  check:
    name: Check, Lint & Test
    # US-004 (prd-v0.2.0-release-hardening): pinned to ubuntu-22.04 to match
    # release.yml's Linux matrix legs (runs-on: ubuntu-22.04 / ubuntu-22.04-arm)
    # so a green PR check guarantees the release build environment — same
    # glibc (2.35), same system library set. Do NOT revert to ubuntu-latest;
    # GitHub began rolling that label to 24.04 in early 2025 and the drift
    # would silently diverge CI from release.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

  # US-001 (prd-macos-port.md): smoke build on Apple Silicon so the PaneFlow
  # dependency closure at the pinned GPUI rev (0b984b5) is proven to compile
  # on aarch64-apple-darwin before any of EP-002..EP-005 lands. The job runs
  # on every PR so a regression in platform-gated code is caught at the PR
  # gate rather than at release cut.
  #
  # Runner: macos-14 (Apple Silicon M1, 3 vCPU / 7 GB, Xcode + CLT preinstalled).
  # Fallback: if a PR consistently exceeds 20 min wall time on macos-14,
  # swap to `macos-14-xlarge` (6 vCPU, paid tier) and note the rationale
  # in the PR description per US-001 AC5.
  macos-check:
    name: macOS aarch64 smoke build
    # US-018 AC5: only run when Rust-relevant files change. `needs: changes`
    # waits for the cheap filter job (runs on ubuntu-latest, ~seconds) and
    # short-circuits the 14× pricier macos-14 runner on docs-only /
    # non-workflow .github/** PRs.
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # US-003 — fail fast if the runner image drifts away from a full Xcode
      # install. The macos-14 hosted image ships Xcode 15+ with the Metal
      # toolchain preinstalled, so under normal conditions every check here
      # succeeds silently; the value is turning an otherwise cryptic mid-compile
      # "Metal.h: no such file" error into a clearly labelled preflight failure
      # that points at the runner configuration rather than the Rust source.
      #
      # The same step is expected to be ported to release.yml's macos-14 matrix
      # leg when US-019 adds it — keep this block in sync across workflows.
      - name: Verify Xcode CLT + Metal toolchain
        run: |
          set -euo pipefail

          CLT_PATH="$(xcode-select -p 2>/dev/null || true)"
          if [ -z "$CLT_PATH" ] || [ ! -d "$CLT_PATH" ]; then
            echo "::error::Xcode Command Line Tools not found (xcode-select -p returned '$CLT_PATH'). GitHub macos-14 runners should ship Xcode preinstalled — this indicates a runner image drift or a misconfigured self-hosted runner."
            exit 1
          fi
          echo "Xcode CLT path: $CLT_PATH"

          SDK_PATH="$(xcrun --show-sdk-path 2>/dev/null || true)"
          if [ -z "$SDK_PATH" ] || [ ! -d "$SDK_PATH" ]; then
            echo "::error::macOS SDK not found (xcrun --show-sdk-path returned '$SDK_PATH')."
            exit 1
          fi
          echo "macOS SDK path: $SDK_PATH"

          if ! xcrun --find metal >/dev/null 2>&1; then
            echo "::error::Metal compiler (xcrun --find metal) not available — the Metal Developer Tools component is missing from this Xcode install. gpui_macos compiles .metal shaders and will fail without it."
            exit 1
          fi
          echo "Metal compiler: $(xcrun --find metal)"

          METAL_HEADERS="$SDK_PATH/System/Library/Frameworks/Metal.framework/Headers"
          if [ ! -d "$METAL_HEADERS" ]; then
            echo "::error::Metal framework headers not found at $METAL_HEADERS. gpui_macos Objective-C bridging will fail with header-not-found errors."
            exit 1
          fi
          echo "Metal framework headers: $METAL_HEADERS"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
          # US-018 AC2 adds cargo fmt + cargo clippy steps below — those
          # need the rustfmt + clippy components, which dtolnay's action
          # does NOT install by default even when `targets:` is set.
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          key: aarch64-apple-darwin

      # US-018 AC2 — formatting + lint on macOS. fmt is platform-agnostic
      # but runs here too so formatter version drift between local Linux
      # dev machines and the macOS runner never sneaks past the gate.
      - name: cargo fmt --check
        run: cargo fmt --check

      # clippy is scoped to the aarch64-apple-darwin target so it
      # type-checks platform-gated modules (runtime_paths.rs macOS arm,
      # install_method::AppBundle, update_checker::AssetFormat::Dmg,
      # etc.) that the ubuntu `check` job would otherwise miss.
      - name: cargo clippy (aarch64-apple-darwin)
        run: cargo clippy --workspace --target aarch64-apple-darwin -- -D warnings

      # cargo test on the config crate (39 tests) + app crate (testable
      # modules like keybindings / update_checker with 150+ tests).
      # `--target` pins compilation to aarch64-apple-darwin so test
      # binaries are native Mach-O and the test run exercises the real
      # macOS codepath, not a Linux-host proxy.
      - name: cargo test --workspace
        run: cargo test --workspace --target aarch64-apple-darwin

      # AC1 — cargo check must exit 0 with no linker errors.
      - name: cargo check (aarch64-apple-darwin)
        run: cargo check --workspace --target aarch64-apple-darwin

      # AC2 — release build produces the expected binary path.
      - name: cargo build --release (aarch64-apple-darwin)
        run: cargo build --release -p paneflow-app --target aarch64-apple-darwin

      # AC3 — verify the produced binary is a Mach-O arm64 executable.
      - name: Verify Mach-O arm64 binary
        run: |
          BIN=target/aarch64-apple-darwin/release/paneflow
          test -f "$BIN"
          file "$BIN"
          file "$BIN" | grep -q 'Mach-O 64-bit executable arm64'

      # AC4 — on failure the job logs already capture the failing crate and
      # error; uploading the binary on success gives reviewers an artifact
      # they can `file`/`otool` locally if something downstream misbehaves.
      - name: Upload aarch64 binary artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: paneflow-aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/paneflow
          if-no-files-found: error
          retention-days: 7

  # US-003 + US-018 (prd-windows-port.md): windows-2022 PR gate. Runs the
  # full Rust quality suite (fmt + clippy + test + check) against the
  # x86_64-pc-windows-msvc target, plus toolchain/WiX verification. US-003
  # stood up the runner + WiX scaffolding; US-018 promotes the job from
  # "smoke cargo check with continue-on-error" to a required quality gate
  # now that EP-W2 (US-004..US-008) + EP-W3 (US-009) have cfg-guarded the
  # POSIX-locked code that previously broke the cross-compile.
  #
  # Runner: windows-2022 hosted image ships VS 2022 Build Tools + the
  # Windows SDK preinstalled but does NOT expose cl/link/signtool on the
  # default shell PATH. ilammy/msvc-dev-cmd loads the VS dev env (cl,
  # link, lib) and an inline PowerShell step prepends the latest SDK
  # bin dir (for signtool.exe) to $GITHUB_PATH.
  #
  # Time budget (US-018 AC-4): <5 min cached. Swatinem/rust-cache handles
  # cargo's share (keyed on `x86_64-pc-windows-msvc` so Linux/macOS cache
  # slots don't collide); actions/cache covers WiX's ~10 MB global tool
  # install. `timeout-minutes: 30` is a runaway guard, not the SLA.
  windows-check:
    name: Windows x86_64 smoke check
    # US-003 AC1 + matches macos-check behavior: skip on docs-only PRs so
    # Windows minutes aren't burned on README tweaks. The filter in the
    # `changes` job already includes .github/workflows/ci.yml, so any
    # edit to this file retriggers the gate.
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Load VS 2022 Build Tools env: cl.exe, link.exe, lib.exe on PATH,
      # INCLUDE/LIB/LIBPATH set. Required by AC-2's `where cl.exe link.exe`.
      # x64 arch targets the same toolchain the rustc msvc triple uses.
      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # signtool.exe ships in the Windows 10 SDK bin dir but is not on the
      # VS Dev Cmd PATH. Resolve the highest-versioned SDK bin subdir and
      # append it to $GITHUB_PATH so later steps (and US-015's signing
      # script work) see it. Explicit `throw` on not-found turns a silent
      # drift of the runner image into a labelled preflight failure.
      - name: Add Windows SDK bin to PATH (for signtool)
        shell: pwsh
        run: |
          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          $sdkBin = Get-ChildItem $sdkRoot -Directory |
            Where-Object { $_.Name -match '^10\.' } |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $sdkBin) {
            throw "Windows 10 SDK bin directory not found under $sdkRoot — runner image drift?"
          }
          $signtoolDir = Join-Path $sdkBin.FullName 'x64'
          Write-Output "Using SDK bin: $signtoolDir"
          Add-Content -Path $env:GITHUB_PATH -Value $signtoolDir

      # AC-2 — toolchain binaries all on PATH.
      - name: Verify signtool.exe / cl.exe / link.exe on PATH
        shell: pwsh
        run: |
          where.exe signtool.exe
          where.exe cl.exe
          where.exe link.exe

      # US-003 AC-1 + US-018 AC-1: Rust toolchain with rustfmt + clippy
      # components (required by the fmt/clippy steps below) and the MSVC
      # cross-compile target.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          key: x86_64-pc-windows-msvc

      # Note: WiX toolset is NOT installed in this PR gate. The MSI build
      # lives in release.yml only (US-016), which uses WiX v3 (candle.exe +
      # light.exe) via the windows-2022 preinstalled toolset paired with
      # cargo-wix 0.3.9 (cargo-wix has no WiX v4/v5 backend — see
      # volks73/cargo-wix#202). Installing `dotnet tool install --global wix`
      # here would surface WiX v5 — incompatible with the release pipeline
      # and unused by the fmt/clippy/test/check gate below, so it's omitted
      # to keep the CI check accurate to what it verifies.

      # ─── US-018 AC-2: quality-gate steps in mandated order ────────────────
      # fmt → clippy → test → check. Each step fails the job fast (`-D
      # warnings` on clippy, `set -e` semantics from GitHub Actions on
      # every step) so a Windows-specific regression surfaces at the PR
      # gate with the exact file:line from rustc/clippy output rather
      # than slipping into release.yml's best-effort Windows leg.

      # AC-2 step 1/4: formatting. `--all` forces every workspace member;
      # `--check` is the non-destructive mode that fails on unformatted
      # code. Runs first because a format failure is cheap and the 3
      # later steps then operate on consistently-formatted source.
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      # AC-2 step 2/4: clippy. `--target x86_64-pc-windows-msvc` selects
      # the Windows codepaths — cfg-gated modules (terminal::TerminateProcess,
      # install_method::WindowsMsi, ipc's interprocess branch, etc.) are
      # only type-checked when this target is chosen. `-D warnings`
      # promotes every clippy lint + unused-import warning to an error,
      # matching the Linux `check` job pattern (line 74) and the release
      # pipeline's clippy gate.
      - name: cargo clippy --target x86_64-pc-windows-msvc
        run: cargo clippy --workspace --target x86_64-pc-windows-msvc -- -D warnings

      # AC-2 step 3/4: tests. Currently all 39 tests live in paneflow-config
      # (platform-neutral: JSON schema, file watcher, keybinding parser);
      # the app crate has no tests per the project convention. Running
      # `--target x86_64-pc-windows-msvc` builds + runs the test binaries
      # as native x86_64 PE executables, proving the Windows test runner
      # picks up the same test set and nothing regresses on the MSVC toolchain.
      - name: cargo test --workspace --target x86_64-pc-windows-msvc
        run: cargo test --workspace --target x86_64-pc-windows-msvc

      # AC-2 step 4/4: final check. Redundant with clippy in practice
      # (clippy is a superset), but kept as a belt-and-braces signal and
      # because the PRD AC lists it explicitly — a bare `cargo check`
      # failure is a clearer error surface than clippy's noisier output
      # when the problem is a pure compile error (missing API, linker
      # symbol, etc.) rather than a lint. No `continue-on-error` anymore
      # (US-003 set it; EP-W2/W3 landing made it unnecessary).
      - name: cargo check --workspace --target x86_64-pc-windows-msvc
        run: cargo check --workspace --target x86_64-pc-windows-msvc
