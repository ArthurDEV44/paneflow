name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Prepare release archive
        run: |
          mkdir -p release/paneflow
          cp target/release/paneflow release/paneflow/
          cp LICENSE README.md release/paneflow/
          cp assets/paneflow.desktop release/paneflow/
          cp -r assets/icons release/paneflow/
          cp scripts/install-icons.sh release/paneflow/
          cd release && tar czf paneflow-${{ github.ref_name }}-x86_64-linux.tar.gz paneflow/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/paneflow-${{ github.ref_name }}-x86_64-linux.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
