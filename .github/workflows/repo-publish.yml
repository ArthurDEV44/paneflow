name: Publish APT + RPM repositories

# Runs after a GitHub release is published (human-gated — the release.yml
# workflow only uploads artifacts; a maintainer then clicks "Publish release"
# on the draft, which fires this job). Can also be dispatched manually to
# re-publish a previous release (e.g., after fixing a bucket issue).
#
# Output: pkg.paneflow.dev/apt + pkg.paneflow.dev/rpm, both GPG-signed.
# Clients point their apt/dnf sources at those URLs and `apt upgrade` /
# `dnf upgrade` pulls subsequent releases automatically.
#
# --- Failure-preservation contract (US-015 AC7) -----------------------------
# All signing and metadata generation happens on the runner's local
# filesystem. `rclone sync staging→R2` is the LAST step. `set -euo pipefail`
# on every bash step aborts the whole script on signing failure, so the
# remote R2 state is never mutated after a signing error.
# ---------------------------------------------------------------------------

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)publish (e.g., v0.2.0)"
        required: true

permissions:
  contents: read

concurrency:
  # Serialize repo publishes — two concurrent workflows racing on the
  # same R2 prefix would corrupt reprepro's db/ and produce undefined
  # final state. `cancel-in-progress: false` because we want the first
  # one to finish cleanly rather than being interrupted half-way.
  group: repo-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-22.04
    env:
      # Release tag we're publishing — sourced from either the release
      # event or the manual dispatch input. Plumbed through `env:` so
      # `${{ github.event.release.tag_name }}` never reaches bash as an
      # expression-substituted string (injection-hardening).
      TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
      # rclone — env-var-only config. `NO_CHECK_BUCKET=true` is mandatory
      # for Cloudflare R2 (HEAD bucket returns 403 even with correct
      # credentials, per Cloudflare's rclone guide).
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      RCLONE_CONFIG_R2_REGION: auto
      RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install repo-publishing tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            reprepro \
            createrepo-c \
            rclone \
            gnupg

      - name: Verify required secrets are present
        # Fail fast with a human-readable error rather than bubbling up
        # the individual tool's "key not loaded" / 403 / etc later. This
        # is US-015 AC7's "signing failure doesn't silently produce an
        # unsigned release" guarantee, extended one step upstream.
        #
        # US-003 adds CLOUDFLARE_ZONE + CLOUDFLARE_AUTH_KEY — required by
        # the post-sync edge cache purge. A missing secret here surfaces
        # as a loud ::error:: instead of silently shipping stale metadata
        # until the edge TTL expires.
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
          CLOUDFLARE_AUTH_KEY: ${{ secrets.CLOUDFLARE_AUTH_KEY }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${GPG_PRIVATE_KEY:-}"     ] && missing+=("GPG_PRIVATE_KEY")
          [ -z "${GPG_PASSPHRASE:-}"      ] && missing+=("GPG_PASSPHRASE")
          [ -z "${GPG_KEY_ID:-}"          ] && missing+=("GPG_KEY_ID")
          [ -z "${R2_BUCKET:-}"           ] && missing+=("R2_BUCKET")
          [ -z "${CLOUDFLARE_ZONE:-}"     ] && missing+=("CLOUDFLARE_ZONE")
          [ -z "${CLOUDFLARE_AUTH_KEY:-}" ] && missing+=("CLOUDFLARE_AUTH_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required secrets (US-017 + R2 + Cloudflare setup): ${missing[*]}" >&2
            echo "::error::See docs/pkg-repo-runbook.md for the full list + how to populate them." >&2
            exit 1
          fi
          # GPG_KEY_ID must be the 40-char hex fingerprint. Short 16-char
          # key IDs are collision-vulnerable (see https://evil32.com/) —
          # an attacker who could populate `GPG_KEY_ID` with a short ID
          # pointing at a rogue key would satisfy any later fingerprint
          # match against keys whose full fingerprints end in those 16
          # hex chars. This regex is harmonised with the equivalent
          # validation in release.yml — both workflows MUST reject short
          # key IDs identically to eliminate the attack class entirely.
          if ! [[ "$GPG_KEY_ID" =~ ^[0-9A-Fa-f]{40}$ ]]; then
            echo "::error::GPG_KEY_ID must be the 40-char hex fingerprint (got ${#GPG_KEY_ID} chars)." >&2
            echo "::error::Short key IDs are rejected because they are collision-vulnerable (evil32.com)." >&2
            exit 1
          fi
          # Cloudflare Zone IDs are 32 lowercase hex chars. A malformed
          # zone would otherwise surface as an opaque Cloudflare 400
          # mid-purge, after R2 is already written. Fail early with a
          # clear message — mirrors the GPG_KEY_ID shape check above.
          if ! [[ "$CLOUDFLARE_ZONE" =~ ^[0-9a-f]{32}$ ]]; then
            echo "::error::CLOUDFLARE_ZONE must be a 32-char lowercase hex Zone ID (got ${#CLOUDFLARE_ZONE} chars)." >&2
            echo "::error::Copy it from the Cloudflare dashboard → Overview → API → Zone ID." >&2
            exit 1
          fi

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          # `allow-loopback-pinentry` lets us pass the passphrase via
          # `--pinentry-mode loopback --passphrase-fd 0` instead of
          # requiring a TTY — GPG has no interactive pinentry in CI.
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true
          # `--batch` silences prompts; `--import` reads the ASCII-armored
          # private key from stdin. `<<<` here-string preserves newlines.
          gpg --batch --import <<< "$GPG_PRIVATE_KEY"

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p ./assets
          # `gh release download` fetches matching assets from the tagged
          # release. `$TAG` and `$REPO` come from env (set via the step
          # `env:` block above) rather than being inlined as GitHub Actions
          # expression substitutions, so a crafted tag can never be
          # shell-interpreted as a command (injection-hardening).
          gh release download "$TAG" \
            --repo "$REPO" \
            --pattern "*.deb" \
            --pattern "*.rpm" \
            --dir ./assets
          ls -la ./assets

      - name: Pull current R2 repo state into local staging
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          mkdir -p ./staging/apt ./staging/rpm/Packages
          # `--fast-list` batches LIST calls (1000 per API call) — keeps
          # R2 Class A operation costs under control. On an empty remote
          # prefix rclone returns 0 with 0 files transferred (thanks to
          # `NO_CHECK_BUCKET=true`), so no fallback is needed. A network
          # / auth error MUST surface — a swallowed error here would let
          # reprepro rebuild from an empty db/ and clobber a real pool.
          rclone sync "R2:${R2_BUCKET}/apt/" ./staging/apt/ --fast-list
          rclone sync "R2:${R2_BUCKET}/rpm/" ./staging/rpm/ --fast-list
          # Copy `conf/` AFTER the sync. Doing it before (then syncing
          # against an empty remote) would wipe it back out — `rclone
          # sync` is mirror-semantics. Post-sync copy handles both the
          # empty-bucket (first publish) case and the re-publish case
          # uniformly: the checked-in `conf/distributions` + `options`
          # are always the source of truth.
          cp -af packaging/apt/conf/. ./staging/apt/conf/

      - name: Publish .deb via reprepro
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          # Substitute the GPG fingerprint into conf/distributions. The
          # checked-in file has `SignWith: REPLACE_WITH_GPG_KEY_ID` — we
          # rewrite it per-run so the fingerprint never hits git history.
          # GPG_KEY_ID is pre-validated to match ^[0-9A-Fa-f]{16,40}$ in
          # the secrets-check step, so it's safe as a sed replacement.
          sed -i "s/REPLACE_WITH_GPG_KEY_ID/${GPG_KEY_ID}/g" ./staging/apt/conf/distributions

          # Prime the gpg-agent passphrase cache by signing a throwaway
          # payload. reprepro invokes gpg through gpgme, which talks to
          # the agent — we need the passphrase cached there BEFORE
          # `includedeb` runs, otherwise the agent prompts for a TTY and
          # the step hangs.
          #
          # An earlier draft of this workflow primed the cache via
          # `gpg --quick-set-expire $KEY 0`, which has the side effect
          # of setting the key's expiry to "never" on every run — a
          # silent security regression. Signing a throwaway payload
          # has no key-metadata side effect.
          #
          # `--passphrase-file <(...)` uses bash process substitution to
          # give gpg a transient FD backed by the passphrase. This
          # avoids (a) leaking the passphrase via `/proc/<pid>/cmdline`
          # as with `--passphrase "$VAR"`, and (b) the stdin-collision
          # we'd have with `--passphrase-fd 0` + a `--clearsign` that
          # also wants to read from stdin.
          printf 'prime-agent' | gpg --batch --yes \
            --passphrase-file <(printf '%s' "$GPG_PASSPHRASE") \
            --pinentry-mode loopback \
            --local-user "$GPG_KEY_ID" \
            --armor --clearsign \
            --output /dev/null

          # `includedeb stable <file.deb>` adds the package to the `stable`
          # distribution's pool and regenerates + re-signs dists/stable/
          # Release, Release.gpg, InRelease atomically. Multiple .deb
          # files (e.g., amd64 + arm64) can be added in one run.
          #
          # Idempotency: reprepro refuses to add a (package, version,
          # arch) that's already in the db. Re-dispatching the same tag
          # without this check would fail at the first duplicate. We
          # pre-check and skip instead — lets a maintainer safely
          # rerun a failed publish.
          for deb in ./assets/paneflow-*.deb; do
            [ -f "$deb" ] || continue
            version=$(dpkg-deb --field "$deb" Version)
            arch=$(dpkg-deb --field "$deb" Architecture)
            existing=$(reprepro -b ./staging/apt list stable paneflow | \
              awk -v v="$version" -v a="$arch" \
                '$0 ~ ":" && $NF == v { print }' || true)
            if [ -n "$existing" ]; then
              echo "→ paneflow $version ($arch) already in stable — skipping"
              continue
            fi
            echo "→ reprepro includedeb stable $deb"
            reprepro -b ./staging/apt includedeb stable "$deb"
          done

          # Sanity check: the signed Release files exist.
          test -f ./staging/apt/dists/stable/Release
          test -f ./staging/apt/dists/stable/Release.gpg
          test -f ./staging/apt/dists/stable/InRelease

      - name: Publish .rpm via createrepo_c + GPG sign
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          # Recreate Packages/ AFTER the rclone sync (upstream task).
          # `rclone sync` has mirror semantics: on a first publish the
          # R2 rpm/ prefix is empty, so the earlier `mkdir -p ./staging/
          # rpm/Packages` gets wiped when sync aligns the local dir
          # with the empty remote. Recreating here makes the step
          # idempotent for both first-publish and re-publish cases.
          mkdir -p ./staging/rpm/Packages

          # Copy the new RPMs into the pool dir. `cp -n` (no-clobber)
          # would let us preserve existing files, but reprepro-style
          # idempotency for RPM means we just overwrite — the RPM
          # filename includes the version, so old versions keep
          # distinct names and stay in the pool until manual pruning.
          for rpm in ./assets/paneflow-*.rpm; do
            [ -f "$rpm" ] || continue
            cp -f "$rpm" ./staging/rpm/Packages/
          done

          # Generate (or incrementally update) the repodata. `--update`
          # reuses existing metadata for RPMs unchanged since the last
          # run (size + mtime check) — essential for repos with dozens
          # of packages.
          createrepo_c --update ./staging/rpm/

          # Sign repomd.xml — createrepo_c itself does not sign.
          # `--detach-sign --armor` → repomd.xml.asc. Clients with
          # `repo_gpgcheck=1` verify this signature before trusting the
          # metadata.
          #
          # Use `--passphrase-file <(...)` (process-substituted FD) rather
          # than `--passphrase "$VAR"` so the passphrase never appears
          # in `/proc/<pid>/cmdline`. Consistent with the reprepro
          # priming step above.
          gpg --batch --yes \
            --passphrase-file <(printf '%s' "$GPG_PASSPHRASE") \
            --pinentry-mode loopback \
            --detach-sign --armor \
            ./staging/rpm/repodata/repomd.xml

          test -f ./staging/rpm/repodata/repomd.xml.asc

      - name: Export GPG public key for /gpg endpoint
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -euo pipefail
          # Publish the public key at the repo root so clients can do
          # `curl https://pkg.paneflow.dev/gpg | gpg --dearmor ...`. The
          # ASCII-armored format is what apt's `signed-by` trust anchor
          # and dnf's `gpgkey=` expect.
          gpg --armor --export "$GPG_KEY_ID" > ./staging/gpg
          test -s ./staging/gpg

      # ─── POINT OF NO RETURN ────────────────────────────────────────────
      # Everything above ran locally. The next step is the first (and
      # only) write to R2. If we've gotten here, all signing succeeded,
      # so the sync is safe. If any prior step failed, `set -euo pipefail`
      # aborted the job before reaching this point — R2 stays untouched.
      - name: Sync local staging → R2
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          # Push ordering matters for client atomicity:
          #
          #   1. GPG key — clients refreshing `/gpg` mid-publish must
          #      not see a 404. Idempotent single-object copyto.
          #   2. APT pool/ (the .deb binaries) — referenced by hash
          #      from dists/**/Packages.gz. If a client fetched new
          #      Packages.gz before we've uploaded the new .deb, the
          #      subsequent GET would return 404 until the pool sync
          #      completes. So: pool first, metadata last.
          #   3. APT full tree — pool is already a no-op (same bytes),
          #      only dists/* changes. Client sees new Release* pointing
          #      at new Packages.gz pointing at a pool that already
          #      exists. Worst case during sync: client sees new
          #      InRelease with old Packages.gz — hash mismatch, `apt
          #      update` errors, and a retry succeeds once Packages.gz
          #      lands. Acceptable transient (seconds-long) window.
          #   4. RPM Packages/ (the .rpm binaries) — same reason as pool.
          #   5. RPM full tree — only repodata/* changes.
          #
          # `--fast-list --transfers 8` are the R2-recommended defaults;
          # `--s3-no-head` is explicitly NOT set (we want rclone to
          # verify each upload landed).
          rclone copyto ./staging/gpg            "R2:${R2_BUCKET}/gpg"              --checksum
          rclone sync   ./staging/apt/pool/      "R2:${R2_BUCKET}/apt/pool/"        --fast-list --transfers 8
          rclone sync   ./staging/apt/           "R2:${R2_BUCKET}/apt/"             --fast-list --transfers 8
          rclone sync   ./staging/rpm/Packages/  "R2:${R2_BUCKET}/rpm/Packages/"    --fast-list --transfers 8
          rclone sync   ./staging/rpm/           "R2:${R2_BUCKET}/rpm/"             --fast-list --transfers 8
          echo "✓ published $TAG to R2:${R2_BUCKET}"

      # ─── Cloudflare edge cache purge (US-003) ────────────────────────────
      # Without this, Cloudflare caches InRelease / Packages.gz / repomd.xml
      # at the edge for up to the zone-configured TTL (default 4 hours). A
      # client running `apt update` immediately after a publish would see
      # the old metadata → the new .deb has a hash mismatch → apt errors.
      # Purging the specific files gives us P95 < 60 s end-to-end freshness
      # (per Cloudflare Instant Purge: < 150 ms globally + HTTP RTT).
      #
      # We invoke `nathanvaughn/actions-cloudflare-purge@v4.0.0` as the
      # primary purge (vetted, minimal wrapper around Cloudflare's
      # /purge_cache endpoint). The action itself has NO retry logic and
      # does not validate HTTP status codes independently — a network-
      # level 5xx or 429 rate-limit can produce a silent failure. The
      # fallback step below catches that case and retries the same purge
      # via direct `curl` to api.cloudflare.com with exponential backoff
      # (1 s, 2 s, 4 s — AC5). Both steps share the identical URL list.
      - name: Purge Cloudflare edge cache
        id: cloudflare-purge
        # Never abort the publish job on a purge failure here — the retry
        # step below takes over. If both steps fail, the final ::error::
        # message is emitted by the retry step and fails the job.
        continue-on-error: true
        # Pinned to the commit SHA for `v4.0.0` rather than the mutable
        # tag. A tag can be force-pushed; a SHA cannot. This is standard
        # hardening for a third-party action that handles a Cloudflare
        # Bearer token capable of purging our repo's CDN state. To bump:
        # re-resolve the tag SHA via
        # `gh api repos/NathanVaughn/actions-cloudflare-purge/git/ref/tags/vX.Y.Z`
        # and update both this SHA and the trailing `# v...` annotation.
        uses: nathanvaughn/actions-cloudflare-purge@1856dd6f59d23cafa1a193db9cff85987c9aaa74 # v4.0.0
        with:
          cf_zone: ${{ secrets.CLOUDFLARE_ZONE }}
          cf_auth: ${{ secrets.CLOUDFLARE_AUTH_KEY }}
          # Seven URLs (AC1): APT InRelease + Release + Release.gpg +
          # Packages.gz (per arch), RPM repomd.xml + repomd.xml.asc. Bulk
          # .deb / .rpm files are NOT purged — they are content-hashed
          # references from Packages.gz / repomd.xml, so they're
          # immutable and Cloudflare's edge cache of them is always
          # correct. Only the metadata files need the cache busted.
          files: |
            https://pkg.paneflow.dev/apt/dists/stable/InRelease
            https://pkg.paneflow.dev/apt/dists/stable/Release
            https://pkg.paneflow.dev/apt/dists/stable/Release.gpg
            https://pkg.paneflow.dev/apt/dists/stable/main/binary-amd64/Packages.gz
            https://pkg.paneflow.dev/apt/dists/stable/main/binary-arm64/Packages.gz
            https://pkg.paneflow.dev/rpm/repodata/repomd.xml
            https://pkg.paneflow.dev/rpm/repodata/repomd.xml.asc

      - name: Retry purge via Cloudflare API on failure (exp backoff 1s/2s/4s)
        # Only runs if the primary action above reported failure. We talk
        # to the Cloudflare API directly so we can (a) check HTTP status
        # codes the wrapper ignores, (b) retry 5xx / 429 with exponential
        # backoff, and (c) surface a final actionable error that names
        # the stale-metadata risk. Secrets routed via `env:` — never
        # inlined as `${{ … }}` into the shell body.
        if: steps.cloudflare-purge.outcome == 'failure'
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
          CLOUDFLARE_AUTH_KEY: ${{ secrets.CLOUDFLARE_AUTH_KEY }}
        run: |
          set -euo pipefail
          # Build the JSON body once. `jq -n` emits a canonical array of
          # strings with correct JSON escaping — safer than hand-rolling
          # quoting, which would break if we ever add a URL with
          # awkward characters.
          body="$(
            jq -n \
              --arg u1 "https://pkg.paneflow.dev/apt/dists/stable/InRelease" \
              --arg u2 "https://pkg.paneflow.dev/apt/dists/stable/Release" \
              --arg u3 "https://pkg.paneflow.dev/apt/dists/stable/Release.gpg" \
              --arg u4 "https://pkg.paneflow.dev/apt/dists/stable/main/binary-amd64/Packages.gz" \
              --arg u5 "https://pkg.paneflow.dev/apt/dists/stable/main/binary-arm64/Packages.gz" \
              --arg u6 "https://pkg.paneflow.dev/rpm/repodata/repomd.xml" \
              --arg u7 "https://pkg.paneflow.dev/rpm/repodata/repomd.xml.asc" \
              '{files: [$u1, $u2, $u3, $u4, $u5, $u6, $u7]}'
          )"

          # This step only runs when the primary action (above) reported
          # failure, so there's no "initial" attempt here — 3 retries with
          # exp-backoff sleeps of 1 s, 2 s, 4 s (2^(n-1)) between retries,
          # matching AC5. Combined with the primary attempt, the publish
          # makes up to 4 purge calls before giving up.
          #
          # --max-time 15 caps a single request; --retry-max-time is
          # intentionally unused (we do our own retry loop so the
          # backoff + error aggregation are explicit).
          response_file="$(mktemp)"
          # Always clean up the response sidecar on exit so a crashed
          # loop does not leave a temp file lying around. Per-iteration
          # `: > "$response_file"` truncation below prevents any stale
          # body from a prior retry being re-read on the next iteration.
          trap 'rm -f "$response_file"' EXIT

          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
              backoff=$(( 1 << (attempt - 1) ))   # 1, 2, 4
              echo "→ Cloudflare purge retry $attempt/$max_attempts — sleeping ${backoff}s then retrying…"
              sleep "$backoff"

              # Truncate BEFORE each curl so a curl that writes 0 bytes
              # (e.g. network timeout) cannot pair with a stale body
              # from a prior iteration to spoof a false-positive success
              # via the jq check.
              : > "$response_file"

              http=$(curl -sS --max-time 15 \
                  -o "$response_file" \
                  -w "%{http_code}" \
                  -X POST \
                  -H "Authorization: Bearer ${CLOUDFLARE_AUTH_KEY}" \
                  -H "Content-Type: application/json" \
                  --data "$body" \
                  "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE}/purge_cache" \
                  || echo "000")

              if [ "$http" = "200" ] \
                 && jq -e '.success == true' "$response_file" > /dev/null
              then
                  echo "✓ Cloudflare cache purged on retry $attempt (HTTP $http)."
                  exit 0
              fi

              echo "  retry $attempt failed — HTTP $http, response:" >&2
              # `jq '.'` pretty-prints if JSON, falls back to raw cat
              # if the body isn't JSON (e.g. Cloudflare 502 HTML page).
              jq '.' "$response_file" 2>/dev/null \
                  || cat "$response_file" >&2
              echo >&2
          done

          # Error message preserves the exact substring mandated by
          # AC7 ("Cloudflare API unreachable — metadata may be stale up
          # to the edge TTL") so any log-grep assertion keyed on that
          # phrase still matches; the retry-count suffix is additive
          # context for the maintainer reading the failed job.
          echo "::error::Cloudflare API unreachable — metadata may be stale up to the edge TTL (failed after ${max_attempts} retries)" >&2
          exit 1
