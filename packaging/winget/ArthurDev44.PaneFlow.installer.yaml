# PaneFlow winget installer manifest (template).
#
# US-019. Source of truth for the installer half of a winget-pkgs PR.
# `.github/workflows/update-winget.yml` renders this file per release by
# substituting the three `__PLACEHOLDER__` tokens below and committing
# the result to `manifests/a/ArthurDev44/PaneFlow/<version>/` on a fork
# of microsoft/winget-pkgs.
#
# Placeholders (resolved by sed in update-winget.yml):
#   __VERSION__  — bare semver, e.g. `0.1.7`
#   __URL__      — full GitHub release asset URL for the signed MSI
#   __SHA256__   — uppercase hex SHA-256 of the MSI (winget convention)
#
# Schema: ManifestVersion 1.12.0 (current stable per
# https://github.com/microsoft/winget-pkgs/tree/master/doc/manifest/schema/1.12.0).
# `InstallerType: wix` tells the winget client to pass standard MSI
# silent-install switches (/quiet /norestart) automatically. This matches
# the cargo-wix output the release pipeline signs via Azure Artifact Signing.
PackageIdentifier: ArthurDev44.PaneFlow
PackageVersion: __VERSION__
InstallerType: wix
Installers:
  - Architecture: x64
    InstallerUrl: __URL__
    InstallerSha256: __SHA256__
    # `uninstallPrevious` makes winget uninstall any prior MSI before
    # installing the new one — prevents the "two entries in Add/Remove
    # Programs" failure mode common to MSI upgrades that rely purely on
    # MajorUpgrade. Our WiX MajorUpgrade element (packaging/wix/main.wxs)
    # handles the in-place upgrade path; this hint covers winget's
    # alternate install path in case a user manually replaced the MSI.
    UpgradeBehavior: uninstallPrevious
ManifestType: installer
ManifestVersion: 1.12.0
