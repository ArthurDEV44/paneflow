[package]
name = "paneflow-app"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "paneflow"
path = "src/main.rs"

[dependencies]
# GPUI framework (path to local Zed monorepo)
gpui = { path = "/home/arthur/dev/zed/crates/gpui" }
gpui_platform = { path = "/home/arthur/dev/zed/crates/gpui_platform", features = ["wayland", "x11"] }
collections = { path = "/home/arthur/dev/zed/crates/collections" }

# Alacritty terminal (Zed's fork — local patch for OSC 7 support)
alacritty_terminal = { path = "/home/arthur/dev/alacritty/alacritty_terminal" }

# Internal crates
paneflow-config = { path = "../crates/paneflow-config" }

# File system watcher (OS-native: inotify/FSEvents/ReadDirectoryChanges)
notify = "7"

# Standard deps
anyhow = "1.0.86"
futures = "0.3"
log = { version = "0.4.16", features = ["kv_unstable_serde", "serde"] }
env_logger = "0.11"
serde = { version = "1.0.221", features = ["derive"] }
serde_json = "1.0"
dirs = "5.0"
rust-embed = { version = "8.11", features = ["include-exclude"] }
smol = "2.0"
libc = "0.2"

[dev-dependencies]
gpui = { path = "/home/arthur/dev/zed/crates/gpui", features = ["test-support"] }
tempfile = "3"
