[workspace]
resolver = "2"
members = [
    "crates/paneflow-core",
    "crates/paneflow-terminal",
    "crates/paneflow-ipc",
    "crates/paneflow-config",
    "crates/paneflow-cli",
    "src-tauri",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Arthur"]

[workspace.dependencies]
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Identifiers
uuid = { version = "1", features = ["v4", "serde"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Internal crates
paneflow-core = { path = "crates/paneflow-core" }
paneflow-terminal = { path = "crates/paneflow-terminal" }
paneflow-ipc = { path = "crates/paneflow-ipc" }
paneflow-config = { path = "crates/paneflow-config" }
