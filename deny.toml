# cargo-deny configuration — US-006 (prd-v0.2.1-release-hardening.md)
#
# Fail-forward posture for v0.2.1:
#   * Licenses + sources + unmaintained + yanked — WARN only.
#     Allows the CI step to SURFACE findings without blocking merges.
#   * Advisory vulnerabilities — no warn-mode in cargo-deny 0.14+
#     (upstream removed the downgrade path). An active RustSec CVE
#     will fail the `security-audit` job. The JOB has
#     `continue-on-error: true` so the red-X is visible but the CI
#     pipeline does not block. Tighten to hard-block in v0.2.2 once
#     the lockfile is audit-clean.
#
# Reference: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Treat unmaintained crates as a workspace-scoped warn (not a blanket
# dep-tree warn). "workspace" scope: only direct workspace members'
# own dependencies are flagged, not 10-hop transitive deps that we
# cannot influence without bumping the root dep.
unmaintained = "workspace"
# Yanked crates: warn-only for now. A yanked transitive dep often
# lingers in lockfiles until the parent publishes a bump; blocking
# on yanked would create bandwidth-vs-noise pressure that isn't
# warranted for a release-engineering PRD.
yanked = "warn"
# Fail if the local copy of the RustSec advisory DB is older than 30
# days — guards against a stale CI runner silently missing recent
# advisories. P30D is ISO 8601 duration syntax (30 days).
maximum-db-staleness = "P30D"
# Surface stale `ignore` entries — when a dep tree change drops the
# vulnerable crate, the corresponding ignore becomes inert noise.
# Warn (don't fail) so a routine GPUI bump doesn't suddenly block a
# tag cut; the warning bubbles up to the CI log and gets cleaned in
# the next deny.toml maintenance pass. Mirrors Bevy's pattern.
unused-ignored-advisory = "warn"

# Explicit advisory ignores. Each entry below MUST document:
#   1. why the advisory does not apply to PaneFlow's threat model
#   2. what triggers re-evaluation (upstream patch, code-path change)
# Reviewed 2026-05-27.
ignore = [
    # RUSTSEC-2023-0071 — Marvin Attack on the `rsa` crate
    # (timing side-channel during RSA private-key decryption).
    #
    # Why ignored:
    #   * `rsa v0.9.x` is a transitive dep via
    #     zed/markdown → zed/language → zed/rpc → rsa.
    #     PaneFlow uses Zed's `markdown` crate purely for AST +
    #     rendering — we never instantiate the `language` server
    #     wiring, never connect to rpc.zed.dev, and the linker
    #     keeps the RSA code only because cargo cannot prove it's
    #     dead at link-time. `grep -rn 'rsa::' src-app/ crates/`
    #     returns zero hits.
    #   * The attack requires the victim to decrypt
    #     attacker-controlled ciphertext and leak timing
    #     differences. PaneFlow's binary never decrypts anything
    #     from a network surface — there is no exploitable code
    #     path.
    #   * Upstream RustCrypto position (per the advisory itself):
    #     "No safe upgrade is available!" — no fixed rsa version
    #     exists as of 2026-05. The recommended migration is to a
    #     different crate, which has to happen on the Zed side
    #     (zed/rpc/Cargo.toml), not ours.
    #
    # Re-evaluation triggers:
    #   * rsa publishes a 0.10+ with timing-safe RSA decryption,
    #   * OR Zed migrates rpc off rsa (drops it from the dep tree),
    #   * OR PaneFlow starts using zed/rpc directly (any
    #     `use rpc::` in src-app/** would invalidate this ignore).
    "RUSTSEC-2023-0071",
]

[licenses]
# Permissive-license allow list. An unlisted license raises a warning
# per the sources warn-posture below. Covers the full Rust ecosystem
# mainstream + the specific ones present in our current Cargo.lock
# (Unicode-3.0 for the Unicode crates, Zlib for miniz_oxide, BSD
# variants for misc parsers, plus extras pulled in by GPUI's image /
# font-kit dep tree: 0BSD, MPL-2.0, CC0-1.0, CDLA-Permissive-2.0,
# bzip2-1.0.6, NCSA — all OSI-approved or public-domain-equivalent).
#
# GPL-3.0 / GPL-3.0-or-later — accepted globally (2026-05-27).
# The Zed monorepo we pin GPUI from contains 33+ crates licensed
# `GPL-3.0` that land in our dep tree as transitive deps of `gpui` /
# `gpui_platform` / `collections` (askpass, clock, component, fs,
# fuzzy, git, icons, language, lsp, markdown, menu, migrator, net,
# paths, proto, release_channel, rope, rpc, settings*, syntax_theme,
# task, telemetry*, text, theme*, ui*, zed_actions, ...). The
# previous per-crate `[[licenses.exceptions]]` for zlog / ztracing
# was unsustainable — every GPUI pin bump shifted the list and the
# CI gate fell out of sync. PaneFlow already statically links these,
# so cargo-deny's noise-vs-block dilemma was the wrong frame: the
# right question is whether PaneFlow's binary distribution license
# is GPL-3-compatible. It is (same posture Zed itself ships under).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "bzip2-1.0.6",
    "NCSA",
    "GPL-3.0",
    "GPL-3.0-or-later",
]

[sources]
# Warn (don't block) on unknown crate registries or git sources so a
# new GPUI-side fork added to `[patch.crates-io]` surfaces in CI
# review but doesn't gate the merge. Promote to "deny" when the
# GPUI pin stabilizes and the fork list stops churning.
unknown-registry = "warn"
unknown-git      = "warn"
# Pin the crates.io registry explicitly; anything else is "unknown".
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]

[sources.allow-org]
# Pre-declared GitHub orgs that host the known git deps transitively
# pulled in by GPUI. Verified against the current Cargo.lock via
#   grep -E '^source = "git\+' Cargo.lock | sed 's|.*github.com/\([^/]*\)/.*|\1|' | sort -u
# which returns exactly these three orgs. When bumping the GPUI pin,
# re-run that check and update the list if new orgs appear.
github = ["zed-industries", "smol-rs", "proptest-rs"]
