<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="wt-wave1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="wt-wave2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="wt-wave3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="wt-glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="wt-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4c1d95" flood-opacity="0.35"/>
    </filter>
    <clipPath id="wt-icon-clip">
      <rect x="56" y="56" width="400" height="400" rx="88"/>
    </clipPath>
  </defs>

  <!-- White app icon -->
  <rect x="56" y="56" width="400" height="400" rx="88" fill="white" filter="url(#wt-shadow)"/>

  <g clip-path="url(#wt-icon-clip)">
    <!-- Stacked wave layers (representing flow / multiple panes) -->
    <!-- Back wave (darkest) -->
    <path d="M56,300 C150,260 250,320 350,280 C400,260 440,270 456,280 L456,456 L56,456 Z"
          fill="url(#wt-wave3)"/>

    <!-- Middle wave -->
    <path d="M56,330 C140,300 220,360 330,310 C380,290 430,300 456,310 L456,456 L56,456 Z"
          fill="url(#wt-wave2)"/>

    <!-- Front wave (lightest) -->
    <path d="M56,365 C160,335 240,390 340,350 C390,330 430,340 456,350 L456,456 L56,456 Z"
          fill="url(#wt-wave1)"/>

    <!-- Glass sheen on waves -->
    <path d="M56,365 C160,335 240,390 340,350 C390,330 430,340 456,350 L456,370
             C430,360 390,350 340,370 C240,410 160,355 56,385 Z"
          fill="url(#wt-glass)"/>
  </g>

  <!-- Terminal prompt floating above waves -->
  <g transform="translate(256, 220)">
    <polyline
      points="-50,-30 -10,0 -50,30"
      stroke="#6d28d9"
      stroke-width="16"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <rect x="10" y="18" width="46" height="8" rx="4" fill="#6d28d9" opacity="0.7"/>
  </g>
</svg>