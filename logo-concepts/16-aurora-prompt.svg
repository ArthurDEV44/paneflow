<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="au-bg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="40%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="au-band1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="30%" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#c084fc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="au-band2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="25%" stop-color="#34d399" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="75%" stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="au-band3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="40%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="au-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#4c1d95" flood-opacity="0.35"/>
    </filter>
    <filter id="au-soft">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <clipPath id="au-clip">
      <rect x="56" y="56" width="400" height="400" rx="88"/>
    </clipPath>
  </defs>

  <!-- App icon with dark sky background -->
  <rect x="56" y="56" width="400" height="400" rx="88" fill="url(#au-bg)" filter="url(#au-shadow)"/>

  <g clip-path="url(#au-clip)">
    <!-- Aurora curtains — flowing vertical bands of light -->
    <!-- Band 1 (top, brightest) -->
    <path d="M56,120 C150,100 200,140 256,110 C312,80 380,130 456,105
             L456,200 C380,220 312,180 256,210 C200,240 150,200 56,220 Z"
          fill="url(#au-band1)" filter="url(#au-soft)"/>

    <!-- Band 2 (middle) -->
    <path d="M56,180 C130,160 200,200 270,170 C340,140 400,185 456,165
             L456,260 C400,280 340,240 270,270 C200,300 130,260 56,280 Z"
          fill="url(#au-band2)" filter="url(#au-soft)"/>

    <!-- Band 3 (lower, faintest) -->
    <path d="M56,250 C140,235 220,265 300,240 C380,215 430,250 456,235
             L456,310 C430,325 380,295 300,320 C220,345 140,315 56,330 Z"
          fill="url(#au-band3)" filter="url(#au-soft)"/>

    <!-- Stars -->
    <circle cx="120" cy="100" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="350" cy="85" r="1" fill="white" opacity="0.5"/>
    <circle cx="400" cy="140" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="140" cy="170" r="1" fill="white" opacity="0.4"/>
    <circle cx="420" cy="250" r="1" fill="white" opacity="0.3"/>
    <circle cx="100" cy="300" r="1.5" fill="white" opacity="0.4"/>
  </g>

  <!-- Terminal >_ prompt -->
  <g transform="translate(256, 370)">
    <polyline
      points="-40,-15 -10,10 -40,35"
      stroke="white"
      stroke-width="11"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      opacity="0.9"
    />
    <rect x="5" y="24" width="38" height="6" rx="3" fill="white" opacity="0.7"/>
  </g>
</svg>