<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="cs1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="cs2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="cs3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="cs4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#09090b"/>

  <!-- Diamond/crystal shape split into 4 panes -->
  <g transform="translate(256, 256)">
    <!-- Top-left facet -->
    <polygon points="0,-190 -160,0 0,0" fill="url(#cs1)"/>
    <!-- Top-right facet -->
    <polygon points="0,-190 160,0 0,0" fill="url(#cs2)"/>
    <!-- Bottom-left facet -->
    <polygon points="-160,0 0,190 0,0" fill="url(#cs4)"/>
    <!-- Bottom-right facet -->
    <polygon points="160,0 0,190 0,0" fill="url(#cs3)"/>

    <!-- Split lines -->
    <line x1="-160" y1="0" x2="160" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <line x1="0" y1="-190" x2="0" y2="190" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

    <!-- Light refraction highlight -->
    <polygon points="0,-190 40,-40 0,0" fill="white" opacity="0.15"/>
    <polygon points="0,0 40,-40 160,0" fill="white" opacity="0.07"/>
  </g>
</svg>