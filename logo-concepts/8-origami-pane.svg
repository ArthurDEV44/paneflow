<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="og1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="og2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="og3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="og4" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#0c0a12"/>

  <!-- Origami-style folded square — a flat pane being folded/split -->
  <g transform="translate(256, 256)">
    <!-- Base square silhouette (shadow) -->
    <rect x="-140" y="-140" width="280" height="280" fill="rgba(139,92,246,0.08)" rx="4"/>

    <!-- Top-left triangle (folded up) -->
    <polygon points="-140,-140 60,-140 -140,60" fill="url(#og4)"/>

    <!-- Top-right triangle -->
    <polygon points="60,-140 140,-140 140,60 60,-140" fill="url(#og1)" opacity="0.8"/>

    <!-- Center diagonal fold — the "split" -->
    <polygon points="-140,60 60,-140 140,60 -60,140" fill="url(#og2)" opacity="0.7"/>

    <!-- Bottom-left triangle -->
    <polygon points="-140,60 -140,140 -60,140" fill="url(#og3)"/>

    <!-- Bottom-right triangle (darkest — furthest from light) -->
    <polygon points="140,60 140,140 -60,140" fill="url(#og3)" opacity="0.6"/>

    <!-- Fold lines -->
    <line x1="-140" y1="60" x2="60" y2="-140" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <line x1="140" y1="60" x2="-60" y2="140" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="60" y1="-140" x2="140" y2="60" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="-140" y1="60" x2="-60" y2="140" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Light catch on top fold -->
    <polygon points="-140,-140 -40,-140 -140,-40" fill="white" opacity="0.1"/>
  </g>
</svg>