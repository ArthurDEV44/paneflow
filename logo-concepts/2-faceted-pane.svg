<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="facet1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="facet2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="facet3" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="facet4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b0764"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" fill="#0f0f0f" rx="0"/>

  <!-- Hexagonal shape divided into faceted panes -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Hexagon outline shape, divided into 3 facets meeting at center -->

    <!-- Top facet -->
    <polygon points="0,-200 173,-100 0,0" fill="url(#facet1)"/>
    <polygon points="0,-200 -173,-100 0,0" fill="url(#facet2)"/>

    <!-- Bottom-right facet -->
    <polygon points="173,-100 173,100 0,0" fill="url(#facet3)"/>
    <polygon points="173,100 0,200 0,0" fill="url(#facet1)" opacity="0.6"/>

    <!-- Bottom-left facet -->
    <polygon points="0,200 -173,100 0,0" fill="url(#facet4)"/>
    <polygon points="-173,100 -173,-100 0,0" fill="url(#facet2)" opacity="0.7"/>

    <!-- Divider lines (splits between facets) -->
    <line x1="0" y1="0" x2="0" y2="-200" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <line x1="0" y1="0" x2="173" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <line x1="0" y1="0" x2="-173" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <line x1="0" y1="0" x2="173" y2="-100" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="0" y1="0" x2="-173" y2="-100" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Bright center point -->
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.9"/>
  </g>
</svg>